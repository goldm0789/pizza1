  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    let firebaseConfig;
    let appId = 'pizza-economy-class';

    try {
      // 자체 플랫폼 실행 시 설정 자동 주입
      firebaseConfig = JSON.parse(__firebase_config);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'pizza-economy-class';
    } catch (e) {
      // ⚠️ 중요: GitHub Pages 등 외부에 배포할 때는 아래에 본인의 Firebase 정보를 직접 적어주세요!
      firebaseConfig = {
        apiKey: "AIzaSyBHLe_wG_zRkQTfz_1Rq2CGKrSSGDX4b10",
        authDomain: "pizza-economy-class.firebaseapp.com",
        projectId: "pizza-economy-class",
        storageBucket: "pizza-economy-class.firebasestorage.app",
        messagingSenderId: "253898972716",
        appId: "1:253898972716:web:5433d5ec549143c0f37b89"
      };
    }

    const appInstance = initializeApp(firebaseConfig);
    const auth = getAuth(appInstance);
    const db = getFirestore(appInstance);

    const MAX_MAKING_BUDGET = 30000; // 피자 최대 제작 예산 (₩20,000 -> ₩30,000 상향)
    const MAX_BUYING_BUDGET = 50000; // 피자 최대 소비 예산 (₩30,000 -> ₩50,000 상향)

    // 25종의 실감나는 피자 식재료 토핑 도감 (신규 6종 포함 및 사이드 카테고리 분할)
    const INGREDIENTS = [
      { id: 'tomato_sauce', name: '토마토 소스', price: 1000, emoji: '🍅', category: 'sauce' },
      { id: 'cream_sauce', name: '크림 소스', price: 1500, emoji: '🥛', category: 'sauce' },
      { id: 'bbq_sauce', name: '바베큐 소스', price: 1800, emoji: '🍯', category: 'sauce' },
      { id: 'cheese_crust', name: '치즈 크러스트 엣지', price: 3000, emoji: '🥯', category: 'edge' },
      { id: 'sweet_potato_crust', name: '고구마무스 엣지', price: 2500, emoji: '🍠', category: 'edge' },
      { id: 'mozzarella', name: '모짜렐라 치즈 조각', price: 2000, emoji: '🧀', category: 'cheese' },
      { id: 'cheddar', name: '체다 치즈 큐브', price: 1500, emoji: '💛', category: 'cheese' },
      { id: 'ricotta', name: '리코타 치즈 덩어리', price: 2500, emoji: '⚪', category: 'cheese' },
      { id: 'hanwoo', name: '명품 한우 토핑', price: 5000, emoji: '🥩', category: 'meat' },
      { id: 'bulgogi', name: '숯불 소고기 조각', price: 3500, emoji: '🤎', category: 'meat' },
      { id: 'pepperoni', name: '페퍼로니 슬라이스', price: 2000, emoji: '🔴', category: 'meat' },
      { id: 'bacon', name: '스모크 베이컨', price: 2500, emoji: '🥓', category: 'meat' },
      { id: 'shrimp', name: '통통 자숙 새우살', price: 4000, emoji: '🦐', category: 'seafood' },
      { id: 'squid', name: '쫄깃 오징어링', price: 2000, emoji: '🦑', category: 'seafood' },
      { id: 'sweet_potato_paste', name: '달콤 고구마무스 조각', price: 2000, emoji: '💛', category: 'veg' },
      { id: 'mushroom', name: '버섯 슬라이스 단면', price: 1200, emoji: '🍄', category: 'veg' },
      { id: 'olive', name: '블랙 올리브 링', price: 800, emoji: '⚫', category: 'veg' },
      { id: 'pineapple', name: '슬라이스 파인애플', price: 1500, emoji: '🍍', category: 'veg' },
      { id: 'pepper', name: '피망 슬라이스', price: 1000, emoji: '🟢', category: 'veg' },
      // 신규 추가 토핑 6종 (감자, 옥수수 및 사이드 전용 콜라, 피클, 디핑소스, 핫소스)
      { id: 'potato', name: '포테이토 웨지 감자', price: 1200, emoji: '🥔', category: 'veg' },
      { id: 'corn', name: '스위트 옥수수 콘', price: 800, emoji: '🌽', category: 'veg' },
      { id: 'garlic_sauce', name: '갈릭 디핑 소스', price: 500, emoji: '🧄', category: 'side' },
      { id: 'hot_sauce', name: '핫소스 보틀', price: 300, emoji: '🌶️', category: 'side' },
      { id: 'cola', name: '얼음 톡 콜라 캔', price: 1500, emoji: '🥤', category: 'side' },
      { id: 'pickle', name: '아삭 수제 오이피클', price: 500, emoji: '🥒', category: 'side' }
    ];

    // 토핑 분산용 좌표 프리셋
    const TOPPING_SPREAD_PRESETS = [
      { r: 0.18, theta: 25 }, { r: 0.35, theta: 85 }, { r: 0.45, theta: 145 },
      { r: 0.52, theta: 205 }, { r: 0.28, theta: 265 }, { r: 0.40, theta: 325 },
      { r: 0.48, theta: 55 },  { r: 0.58, theta: 115 }, { r: 0.22, theta: 175 },
      { r: 0.38, theta: 235 }, { r: 0.50, theta: 295 }, { r: 0.56, theta: 355 }
    ];

    const bgmSound = new Audio('배경음악.mp3');
    bgmSound.loop = true;
    bgmSound.volume = 0.7; // 음량 0.7로 조금 더 높임

    const timerSound = new Audio('타이머 효과음.mp3');
    timerSound.loop = true;
    timerSound.volume = 0.8;

    const alarmSound = new Audio('종료 알람음.mp3');
    alarmSound.volume = 1.0;

    const playTimerSound = () => {
      if (timerSound.paused) {
        timerSound.play().catch(err => console.log("효과음 자동 실행 잠금 대기:", err));
      }
    };

    const stopTimerSound = () => {
      timerSound.pause();
      timerSound.currentTime = 0;
    };

    const playBgmSound = () => {
      if (bgmSound.paused) {
        bgmSound.play().catch(err => console.log("배경음악 자동 실행 잠금 대기:", err));
      }
    };

    const stopBgmSound = () => {
      bgmSound.pause();
      bgmSound.currentTime = 0;
    };

    const playAlarmSound = () => {
      alarmSound.currentTime = 0;
      alarmSound.play().catch(err => console.log("알람음 실행 잠금 대기:", err));
    };

    const stopAlarmSound = () => {
      alarmSound.pause();
      alarmSound.currentTime = 0;
    };

    const stopAllSounds = () => {
      stopBgmSound();
      stopTimerSound();
      stopAlarmSound();
    };

    let state = {
      user: null,
      role: null,
      studentName: '',
      roomCodeInput: '',
      currentRoomId: null,
      activeTab: 'main',
      roomData: null,
      participants: [],
      pizzas: [],
      pizzaName: '',
      // selectedIngredients: [{ id, x, y, key }] 구조로 드래그 좌표 실시간 보존
      selectedIngredients: [],
      hasSubmitted: false,
      buyerWallet: MAX_BUYING_BUDGET,
      purchasedPizzas: [],
      makingQuizAnswer: null,
      alertMessage: null,
      activeQuiz: null,
      studentSessionId: (() => {
        const saved = sessionStorage.getItem('pizza_student_session_id');
        if (saved) return saved;
        const newId = `student_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        sessionStorage.setItem('pizza_student_session_id', newId);
        return newId;
      })()
    };

    // [수정 사항] 누락되었던 피자 판매금액 정렬 함수 추가
    function getSortedPizzas() {
      if (!state.pizzas) return [];
      return [...state.pizzas].sort((a, b) => {
        const totalA = (a.buyers?.length || 0) * (a.price || 0);
        const totalB = (b.buyers?.length || 0) * (b.price || 0);
        return totalB - totalA;
      });
    }

    function setState(newState) {
      state = { ...state, ...newState };
      render();
    }

    function showAlert(msg) {
      setState({ alertMessage: msg });
    }

    function closeAlert() {
      setState({ alertMessage: null });
    }

    function exitRoom() {
      if (unsubRoom) unsubRoom();
      if (unsubParticipants) unsubParticipants();
      if (unsubPizzas) unsubPizzas();

      stopAllSounds();

      setState({
        currentRoomId: null,
        role: null,
        roomData: null,
        participants: [],
        pizzas: [],
        hasSubmitted: false,
        selectedIngredients: [],
        pizzaName: '',
        makingQuizAnswer: null,
        activeTab: 'main',
        roomCodeInput: ''
      });
      showAlert("교실방에서 퇴장하였습니다. 초기 로비 화면으로 이동합니다.");
    }

    // ==========================================
    // 4. 실시간 타이머 가동 엔진 (로컬 Tick 루프)
    // ==========================================
    let timerInterval = null;
    let alarmPlayedForEndTime = 0; // 동일 끝 시간 기준 중복 알람 가청 차단 플래그

    function startLocalTimerTick() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!state.roomData || state.activeTab === 'about') {
          stopAllSounds();
          return;
        }

        const status = state.roomData.timerStatus || 'idle';
        const endTime = state.roomData.timerEndTime || 0;
        const remainingPaused = state.roomData.timerRemainingWhenPaused || 0;

        let displaySeconds = 0;

        if (status === 'running') {
          const now = Date.now();
          displaySeconds = Math.max(0, Math.round((endTime - now) / 1000));
          
          if (displaySeconds > 0) {
            // 타이머가 시작되면 배경음악이 잔잔히 흐름
            playBgmSound();

            if (displaySeconds <= 10) {
              // 타이머 끝나기 10초 전에 타이머 효과음이 반복됨
              playTimerSound();
            } else {
              stopTimerSound();
            }
          } else {
            // 타이머가 끝나면 음악을 멈추고 종료 알람음이 정확히 1회 재생됨
            stopBgmSound();
            stopTimerSound();
            if (alarmPlayedForEndTime !== endTime && endTime > 0) {
              playAlarmSound();
              alarmPlayedForEndTime = endTime;
            }
          }
        } else {
          // 일시정지 상태이므로 배경음악 및 타이머 사운드, 알람음 모두 즉시 뮤트
          stopBgmSound();
          stopTimerSound();
          stopAlarmSound();
          displaySeconds = remainingPaused;
        }

        // 인풋 포커스 수호를 위해 전면 렌더링 대신 클래스 단위 강제 돔 패치
        const timerDisplays = document.querySelectorAll('.timer-countdown-display');
        timerDisplays.forEach(el => {
          const m = Math.floor(displaySeconds / 60);
          const s = displaySeconds % 60;
          el.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        });

        const progressBars = document.querySelectorAll('.timer-progress-bar');
        const totalDuration = state.roomData.timerDuration || 180;
        const progressPct = Math.min(100, (displaySeconds / totalDuration) * 100);
        progressBars.forEach(bar => {
          bar.style.width = `${progressPct}%`;
          if (progressPct < 20) {
            bar.className = "timer-progress-bar h-2 bg-red-500 rounded-full transition-all duration-500 animate-pulse";
          } else {
            bar.className = "timer-progress-bar h-2 bg-amber-500 rounded-full transition-all duration-500";
          }
        });
      }, 500);
    }

    // ==========================================
    // 5. 드래그 앤 드롭 전역 이벤트 딜리게이터
    // ==========================================
    let activeDragKey = null;
    let dragElement = null;
    let startX = 0, startY = 0;
    let originalLeft = 50, originalTop = 50;
    let pizzaRect = null;

    function onPointerDown(e) {
      // 제작 상태이고 본인이 학생인 경우, 그리고 제출 완료가 안 된 시점에만 드래그 궤적 작동 가능
      if (state.role !== 'student' || state.roomData?.status !== 'making' || state.hasSubmitted) return;

      const target = e.target.closest('.draggable-topping');
      if (!target) return;

      e.preventDefault();
      activeDragKey = target.getAttribute('data-key');
      dragElement = target;

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      startX = clientX;
      startY = clientY;

      const container = target.closest('#pizza-dough-container');
      if (!container) return;
      pizzaRect = container.getBoundingClientRect();

      originalLeft = parseFloat(target.style.left) || 50;
      originalTop = parseFloat(target.style.top) || 50;

      document.addEventListener('mousemove', onPointerMove);
      document.addEventListener('mouseup', onPointerUp);
      document.addEventListener('touchmove', onPointerMove, { passive: false });
      document.addEventListener('touchend', onPointerUp);
    }

    function onPointerMove(e) {
      if (!dragElement || !pizzaRect) return;
      e.preventDefault();

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const deltaXPx = clientX - startX;
      const deltaYPx = clientY - startY;

      // 피자 도우 박스 내 비율 변환
      const deltaXPct = (deltaXPx / pizzaRect.width) * 100;
      const deltaYPct = (deltaYPx / pizzaRect.height) * 100;

      let newLeft = originalLeft + deltaXPct;
      let newTop = originalTop + deltaYPct;

      // 도우 이탈 이탈 방지 한계선 계산 (중심(50,50)에서 한계 반경 ~44% 이내로 고정)
      const dist = Math.sqrt(Math.pow(newLeft - 50, 2) + Math.pow(newTop - 50, 2));
      if (dist > 44) {
        const angle = Math.atan2(newTop - 50, newLeft - 50);
        newLeft = 50 + 44 * Math.cos(angle);
        newTop = 50 + 44 * Math.sin(angle);
      }

      dragElement.style.left = `${newLeft}%`;
      dragElement.style.top = `${newTop}%`;
    }

    function onPointerUp(e) {
      if (!dragElement) return;

      const finalLeft = parseFloat(dragElement.style.left);
      const finalTop = parseFloat(dragElement.style.top);

      const index = state.selectedIngredients.findIndex(item => item.key === activeDragKey);

      if (index !== -1) {
        const updated = [...state.selectedIngredients];
        updated[index] = { ...updated[index], x: finalLeft, y: finalTop };
        
        // 데이터 상태 커밋
        setState({ selectedIngredients: updated });
      }

      dragElement = null;
      activeDragKey = null;
      pizzaRect = null;

      document.removeEventListener('mousemove', onPointerMove);
      document.removeEventListener('mouseup', onPointerUp);
      document.removeEventListener('touchmove', onPointerMove);
      document.removeEventListener('touchend', onPointerUp);
    }

    // 전역 델리게이트 이벤트 수렴 바인딩
    document.addEventListener('mousedown', onPointerDown);
    document.addEventListener('touchstart', onPointerDown, { passive: false });

    // ==========================================
    // 6. UI 컴포넌트 렌더링 엔진
    // ==========================================

    function getPizzaVisualizerHTML(ingredients = [], size = 'large', isCreator = false) {
      const isLarge = size === 'large';
      const containerClass = isLarge 
        ? "w-56 h-56 md:w-64 md:h-64 border-[10px]" 
        : "w-24 h-24 border-[5px]";
      
      const ids = ingredients.map(item => typeof item === 'string' ? item : item.id);

      let crustHTML = '';
      if (ids.includes('cheese_crust')) {
        crustHTML += `<div class="absolute inset-0 rounded-full z-10 pointer-events-none ${isLarge ? 'border-[18px]' : 'border-[8px]'} border-[#FCD973]/70"></div>`;
      }
      if (ids.includes('sweet_potato_crust')) {
        crustHTML += `<div class="absolute inset-0 rounded-full z-10 pointer-events-none ${isLarge ? 'border-[18px]' : 'border-[8px]'} border-[#FFD700]/60"></div>`;
      }

      let sauceHTML = '';
      if (ids.includes('tomato_sauce')) {
        sauceHTML += `<div class="w-[88%] h-[88%] bg-[#E05A47]/95 rounded-full absolute shadow-inner"></div>`;
      } else if (ids.includes('cream_sauce')) {
        sauceHTML += `<div class="w-[88%] h-[88%] bg-[#F5F5DC] rounded-full absolute shadow-inner"></div>`;
      } else if (ids.includes('bbq_sauce')) {
        sauceHTML += `<div class="w-[88%] h-[88%] bg-[#8B4513]/80 rounded-full absolute shadow-inner"></div>`;
      }

      let cheeseHTML = '';
      if (ids.includes('mozzarella')) {
        cheeseHTML += `<div class="w-[80%] h-[80%] bg-[#FAD054]/90 rounded-full absolute opacity-90 shadow-md" style="background-image: radial-gradient(circle, #FCD973 15%, transparent 15%); background-size: ${isLarge ? '24px 24px' : '12px 12px'};"></div>`;
      }

      let toppingsHTML = '';
      
      // 개별 드래그 가능한 토핑들 마운트 처리 (소스, 엣지, 치즈크러스트, 사이드는 제외)
      ingredients.forEach((item, idx) => {
        const id = typeof item === 'string' ? item : item.id;
        const key = typeof item === 'string' ? `${id}_${idx}` : item.key;
        
        const ing = INGREDIENTS.find(i => i.id === id);
        if (!ing || ing.category === 'sauce' || ing.category === 'edge' || id === 'mozzarella' || ing.category === 'side') return;

        let x = 50;
        let y = 50;

        if (typeof item !== 'string' && item.x !== null && item.y !== null) {
          x = item.x;
          y = item.y;
        } else {
          const presetIdx = idx % TOPPING_SPREAD_PRESETS.length;
          const pos = TOPPING_SPREAD_PRESETS[presetIdx];
          const angleRad = pos.theta * (Math.PI / 180);
          x = 50 + (pos.r * 100 * Math.cos(angleRad)) * 0.85;
          y = 50 + (pos.r * 100 * Math.sin(angleRad)) * 0.85;
        }

        // 토핑의 크기 60% 이상 확대 (isLarge 시 25px, 마켓 등 소형 뷰어 시 15px로 확대 상향 조정)
        const emojiSize = isLarge ? '25px' : '15px';
        const cursorClass = (isCreator && isLarge) ? 'draggable-topping cursor-grab active:cursor-grabbing hover:scale-110 active:scale-125 z-30' : 'z-20';

        toppingsHTML += `
          <div class="absolute select-none font-sans transition-transform ${cursorClass}" 
               data-key="${key}"
               style="top: ${y}%; left: ${x}%; font-size: ${emojiSize}; transform: translate(-50%, -50%); line-height: 1;">
            ${ing.emoji}
          </div>
        `;
      });

      let placeholderHTML = '';
      const actualDoughToppings = ids.filter(id => {
        const ing = INGREDIENTS.find(i => i.id === id);
        return ing && ing.category !== 'side';
      });

      if (actualDoughToppings.length === 0) {
        placeholderHTML = `
          <div class="absolute inset-0 bg-black/5 flex items-center justify-center text-center p-2 z-10">
            <p class="text-orange-950/60 font-black text-[10px] md:text-xs">
              재료 보관소에서<br>토핑을 담아주세요!
            </p>
          </div>
        `;
      }

      return `
        <div id="pizza-dough-container" class="rounded-full relative overflow-hidden bg-[#EED8B1] shadow-inner transition-all duration-300 flex items-center justify-center ${containerClass}" style="border-color: #C68B59;">
          ${crustHTML}
          ${sauceHTML}
          ${cheeseHTML}
          ${toppingsHTML}
          ${placeholderHTML}
        </div>
      `;
    }

    function getSidesTrayHTML(ingredients = [], size = 'large') {
      const ids = ingredients.map(item => typeof item === 'string' ? item : item.id);
      const sideIds = ids.filter(id => {
        const ing = INGREDIENTS.find(i => i.id === id);
        return ing && ing.category === 'side';
      });

      if (sideIds.length === 0) {
        return `

    function addIngredient(ingId) {
      const ing = INGREDIENTS.find(i => i.id === ingId);
      if (!ing) return;

      const currentCost = state.selectedIngredients.reduce((sum, item) => {
        const ingDetail = INGREDIENTS.find(i => i.id === item.id);
        return sum + (ingDetail ? ingDetail.price : 0);
      }, 0);

      if (currentCost + ing.price > MAX_MAKING_BUDGET) {
        showAlert(`💸 앗! 재료비 한도(${MAX_MAKING_BUDGET.toLocaleString()}원)를 초과할 수 없습니다! 모든 고급 재료를 원하는 만큼 제한 없이 쓸 수 없는 현상을 '자원의 희소성'이라고 합니다. 다른 토핑을 빼거나 예산에 맞는 똑똑한 레시피를 만들어보세요.`);
        return;
      }

      // 수량 파악
      const count = state.selectedIngredients.filter(item => item.id === ingId).length;

      let newTopping;
      if (ing.category === 'sauce' || ing.category === 'edge' || ing.id === 'mozzarella' || ing.category === 'side') {
        // 드래그 제외 객체 생성 (기본 소스 및 사이드 종류)
        newTopping = { id: ingId, x: null, y: null, key: `${ingId}_${Date.now()}_${Math.floor(Math.random()*1000)}` };
      } else {
        // 드래그 가능한 도우용 정규 토핑
        const presetIdx = count % TOPPING_SPREAD_PRESETS.length;
        const preset = TOPPING_SPREAD_PRESETS[presetIdx];
        const angleRad = preset.theta * (Math.PI / 180);
        // 중심 (50, 50) 기준 분산값 변환
        const x = 50 + (preset.r * 100 * Math.cos(angleRad)) * 0.85;
        const y = 50 + (preset.r * 100 * Math.sin(angleRad)) * 0.85;
        newTopping = { id: ingId, x, y, key: `${ingId}_${Date.now()}_${Math.floor(Math.random()*1000)}` };
      }

      setState({
        selectedIngredients: [...state.selectedIngredients, newTopping]
      });
    }

    function removeIngredient(ingId) {
      const index = state.selectedIngredients.map(item => item.id).lastIndexOf(ingId);
      if (index === -1) return;
      const updated = [...state.selectedIngredients];
      updated.splice(index, 1);
      setState({
        selectedIngredients: updated
      });
    }

      const totalSec = minVal * 60 + secVal;

        showAlert("⏳ 타이머 시간을 최소 1초 이상으로 할당해 주세요!");

      const duration = currentStatus === 'paused' 
        ? (state.roomData.timerRemainingWhenPaused || 180) 
        : (state.roomData.timerDuration || 180);

      const targetEndTime = Date.now() + duration * 1000;

      try {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', state.currentRoomId);
        await updateDoc(roomRef, {
          timerStatus: 'running',
          timerEndTime: targetEndTime
        });

        console.error("타이머 시작 에러:", err);
        showAlert("타이머를 시작할 수 없습니다.");

    async function handlePauseTimer() {
      if (!state.currentRoomId || !state.roomData) return;

      const currentEndTime = state.roomData.timerEndTime || 0;
      const remaining = Math.max(0, Math.round((currentEndTime - Date.now()) / 1000));

      try {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', state.currentRoomId);
        await updateDoc(roomRef, {
          timerStatus: 'paused',
          timerRemainingWhenPaused: remaining,
          timerEndTime: 0
        });
        // 일시정지를 누르면 모든 음악과 알람 소리가 즉각 정지됨

        showAlert("타이머를 일시정지하지 못했습니다.");

    // ==========================================
    // 8. 실시간 Firestore 연동 동기화 모듈 (onSnapshot) 구현
    // ==========================================
    let unsubRoom = null;
    let unsubParticipants = null;
    let unsubPizzas = null;

    function setupRealtimeSync(roomId) {
      if (unsubRoom) unsubRoom();
      if (unsubParticipants) unsubParticipants();
      if (unsubPizzas) unsubPizzas();

      if (!roomId) return;

      const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
      unsubRoom = onSnapshot(roomDocRef, (snapshot) => {
        if (snapshot.exists()) {
          setState({ roomData: { id: snapshot.id, ...snapshot.data() } });
        } else {
          showAlert("교실이 존재하지 않거나 종료되었습니다.");
          exitRoom();
        }
      }, (error) => console.error("방 정보 구독 에러:", error));

      const participantsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'participants');
      unsubParticipants = onSnapshot(participantsColRef, (snapshot) => {
        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const filtered = list.filter(p => p.roomId === roomId);
        setState({ participants: filtered });
      }, (error) => console.error("참여자 명단 구독 에러:", error));

      const pizzasColRef = collection(db, 'artifacts', appId, 'public', 'data', 'pizzas');
      unsubPizzas = onSnapshot(pizzasColRef, (snapshot) => {
        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const filtered = list.filter(p => p.roomId === roomId);

        const myPizza = filtered.find(p => p.creatorId === state.studentSessionId);
        let hasSubmitted = state.hasSubmitted;
        let selectedIngredients = state.selectedIngredients;
        let pizzaName = state.pizzaName;
        let makingQuizAnswer = state.makingQuizAnswer;

        if (myPizza) {
          hasSubmitted = true;
          // 불러올 때 드래그 전송 좌표 리로드 동화
          if (myPizza.toppingPositions) {
            selectedIngredients = myPizza.toppingPositions;
          }
        } else {
          if (state.hasSubmitted) {
            hasSubmitted = false;
            selectedIngredients = [];
            pizzaName = '';
            makingQuizAnswer = null;
          }
        }

        let totalSpent = 0;
        const myPurchases = [];

        filtered.forEach(pizza => {
          const myCount = (pizza.buyers || []).filter(id => id === state.studentSessionId).length;
          if (myCount > 0) {
            totalSpent += pizza.price * myCount;
            for (let i = 0; i < myCount; i++) {
              myPurchases.push(pizza.id);
            }
          }
        });

        setState({
          pizzas: filtered,
          hasSubmitted,
          selectedIngredients,
          pizzaName,
          makingQuizAnswer,
          purchasedPizzas: myPurchases,
          buyerWallet: MAX_BUYING_BUDGET - totalSpent
        });
      }, (error) => console.error("피자 마켓 구독 에러:", error));
    }

    // ==========================================
    // 9. 전역 브라우저 바인딩 및 함수 등록
    // ==========================================
    window.closeAlert = closeAlert;
    window.exitRoom = exitRoom;
    window.updateStateField = (field, value) => {
      if (field === 'pizzaName') {
        state.pizzaName = value;
      } else if (field === 'studentName') {
        state.studentName = value;
      } else if (field === 'roomCodeInput') {
        state.roomCodeInput = value;
      }
    };

    window.addIngredient = (ingId) => {
      addIngredient(ingId);
    };

    window.removeIngredient = (ingId) => {
      removeIngredient(ingId);
    };

    window.navTab = (tab) => {
      setState({ activeTab: tab });
    };

    window.handleJoinRoom = async () => {
      const roomVal = document.getElementById('roomCodeField')?.value || '';
      const nameVal = document.getElementById('studentNameField')?.value || '';
      
      if (!roomVal || roomVal.length !== 6) {
        showAlert("선생님이 보여주신 6자리 인증번호를 정확히 입력해 주세요.");
        return;
      }
      if (!nameVal.trim()) {
        showAlert("이름을 적어주셔야 피자 마켓에 입장할 수 있습니다.");
        return;
      }

      try {
        const roomsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'rooms');
        const querySnapshot = await getDocs(roomsColRef);
        const roomsList = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const targetRoom = roomsList.find(r => r.code === roomVal.trim());

        if (targetRoom) {
          const participantRef = doc(db, 'artifacts', appId, 'public', 'data', 'participants', state.studentSessionId);
          await setDoc(participantRef, {
            roomId: targetRoom.id,
            studentId: state.studentSessionId,
            name: nameVal.trim(),
            role: 'student',
            joinedAt: Date.now()
          });

          setState({
            studentName: nameVal.trim(),
            currentRoomId: targetRoom.id,
            role: 'student'
          });
          setupRealtimeSync(targetRoom.id);
        } else {
          showAlert("인증번호가 바르지 않거나 활성화된 방을 찾을 수 없습니다.");
        }
      } catch (err) {
        console.error(err);
        showAlert("교실 참가 중 에러가 발생했습니다. 다시 한번 가입 버튼을 눌러주세요.");
      }
    };

    window.handleCreateRoom = handleCreateRoom;
    window.handleUpdateRoomStatus = handleUpdateRoomStatus;
    window.handleResetRoom = handleResetRoom;
    window.handleSubmitPizza = handleSubmitPizza;
    window.handleBuyPizza = async (pizzaId) => {
      const p = state.pizzas.find(x => x.id === pizzaId);
      if (p) await handleBuyPizza(p);
    };
    window.handleRefundPizza = async (pizzaId) => {
      const p = state.pizzas.find(x => x.id === pizzaId);
      if (p) await handleRefundPizza(p);
    };

    window.applyTimerSettings = applyTimerSettings;
    window.handleStartTimer = handleStartTimer;
    window.handlePauseTimer = handlePauseTimer;
    window.handleResetTimer = handleResetTimer;

    window.submitQuizAnswer = (ans) => {
      setState({ makingQuizAnswer: ans });
    };
    
    window.closeQuizModal = () => {
      if (!state.makingQuizAnswer) {
        showAlert("복습 정답을 터치해서 골라보세요!");
        return;
      }
      setState({ activeQuiz: null });
    };

    window.generatePDFReport = generatePDFReport;

    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("인증 실패:", err);
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        state.user = user;
        if (state.currentRoomId) {
          setupRealtimeSync(state.currentRoomId);
        } else {
          try {
            const participantRef = doc(db, 'artifacts', appId, 'public', 'data', 'participants', state.studentSessionId);
            const pSnap = await getDoc(participantRef);
            if (pSnap.exists()) {
              const pData = pSnap.data();
              setState({
                currentRoomId: pData.roomId,
                studentName: pData.name,
                role: pData.role || 'student'
              });
              setupRealtimeSync(pData.roomId);
            }
          } catch(e) {}
        }
      }
      render();
    });

    window.onload = function() {
      const reportDiv = document.createElement('div');
      reportDiv.id = 'classroom-report';
      reportDiv.className = 'hidden p-8 bg-white text-slate-800 font-sans max-w-4xl mx-auto space-y-8';
      document.body.appendChild(reportDiv);
      
      setInterval(updatePDFContainerData, 2000);
      startLocalTimerTick(); // 타임 엔진 가동 시작
      initAuth(); // 익명 가입 호출
      render();
    };

    function updatePDFContainerData() {
      const element = document.getElementById('classroom-report');
      if (!element || !state.currentRoomId) return;

      const sorted = getSortedPizzas();
      const top3 = sorted.slice(0, 3);
      const totalTx = state.pizzas.reduce((sum, p) => sum + (p.buyers?.length || 0), 0);
      const totalRev = state.pizzas.reduce((sum, p) => sum + ((p.buyers?.length || 0) * p.price), 0);

      element.innerHTML = `
        <div class="text-center space-y-2 border-b-4 border-slate-900 pb-6">
          <p class="text-xs tracking-wider uppercase font-extrabold text-slate-500 font-mono">초등학교 4학년 사회과 [자원의 희소성과 현명한 선택] 활동 보고서</p>
          <h1 class="text-3xl font-black text-rose-600">🍕 가상 피자가게 경제 교실 시뮬레이션 보고지</h1>
          <p class="text-xs text-slate-400">교실 방 고유코드: ${state.roomData?.code || '......'} | 학급 명세 추출: ${new Date().toLocaleString()}</p>
        </div>

        <div class="grid grid-cols-3 gap-4 text-center">
          <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
            <p class="text-[10px] text-slate-500 font-bold uppercase">전체 실습 참여 학생</p>
            <p class="text-xl font-black mt-1 text-slate-800">${state.participants.filter(p => p.role === 'student').length}명</p>
          </div>
          <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
            <p class="text-[10px] text-slate-500 font-bold uppercase">시장 누적 피자 거래량</p>
            <p class="text-xl font-black mt-1 text-emerald-600">${totalTx}판 판매완료</p>
          </div>
          <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
            <p class="text-[10px] text-slate-500 font-bold uppercase">시장 총 거래 유통규모</p>
            <p class="text-xl font-black mt-1 text-orange-600">₩${totalRev.toLocaleString()}</p>
          </div>
        </div>

        <div class="space-y-3">
          <h3 class="text-base font-black border-l-4 border-orange-500 pl-2">🏆 피자 판매왕 영광의 랭킹 (Top 3)</h3>
          <div class="grid grid-cols-3 gap-4">
            ${top3.map((pizza, idx) => `
              <div class="p-4 rounded-xl border border-slate-300 bg-orange-50/10 text-center space-y-1">
                <span class="text-sm font-black text-slate-700">${idx + 1}위 : ${pizza.name}</span>
                <p class="text-xs text-orange-600 font-bold">기획 학생: ${pizza.creatorName}</p>
                <div class="text-[10px] text-slate-500 pt-1 border-t border-dashed border-slate-200 space-y-0.5 font-sans">
                  <p>단가 가격: ₩${pizza.price.toLocaleString()}</p>
                  <p>총 판매량: <strong>${pizza.buyers?.length || 0}판</strong></p>
                  <p>총 판매금액: <strong>₩${((pizza.buyers?.length || 0) * pizza.price).toLocaleString()}</strong></p>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="space-y-3">
          <h3 class="text-base font-black border-l-4 border-orange-500 pl-2">📊 전체 기획 피자 상세 성과 명세</h3>
          <table class="w-full text-left text-xs border-collapse border border-slate-200">
            <thead>
              <tr class="bg-slate-100 text-slate-900 border-b border-slate-200 font-bold">
                <th class="p-2 border-r border-slate-200 font-black">기획자 학생</th>
                <th class="p-2 border-r border-slate-200 font-black">피자 작품명</th>
                <th class="p-2 border-r border-slate-200 font-black">최종 판매가</th>
                <th class="p-2 border-r border-slate-200 font-black text-center">누적 판매량</th>
                <th class="p-2 border-r border-slate-200 font-black text-center">총 판매금액</th>
                <th class="p-2 font-black">구매 학생 명단 (중복 포함)</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map(pizza => {
                const buyerNames = (pizza.buyers || []).map(sid => {
                  const found = state.participants.find(p => p.studentId === sid);
                  return found ? found.name : '학생';
                }).join(', ');
                return `
                  <tr class="border-b border-slate-200">
                    <td class="p-2 border-r border-slate-200 font-bold">${pizza.creatorName}</td>
                    <td class="p-2 border-r border-slate-200">${pizza.name}</td>
                    <td class="p-2 border-r border-slate-200 font-mono">₩${pizza.price.toLocaleString()}</td>
                    <td class="p-2 border-r border-slate-200 text-center font-bold text-slate-800">${pizza.buyers?.length || 0}판</td>
                    <td class="p-2 border-r border-slate-200 text-center font-bold text-orange-600">₩${((pizza.buyers?.length || 0) * pizza.price).toLocaleString()}</td>
                    <td class="p-2 text-slate-500 italic text-[10px]">${buyerNames || '기록 없음'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>

        <div class="pt-12 text-center text-slate-400 text-[10px] border-t border-slate-200">
          <p>이 결과 보고서는 피자나라 경제 실습 프로그램을 완수한 공식 실습 데이터 보고서입니다.</p>
          <p>© 피자나라 경제교실 시뮬레이터 프로그램 제공</p>
        </div>
      `;
    }
  </script>
</body>
</html>
