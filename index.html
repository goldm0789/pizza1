<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>피자나라 경제교실 - 안정화 버전</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: "Pretendard", "Noto Sans KR", system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
      color: #1e293b;
    }

    .pizza-base {
      background:
        radial-gradient(circle at 50% 50%, #ffd98f 0%, #ffc96e 62%, #dd8f3e 63%, #bf6d21 77%, #8a4d17 100%);
      box-shadow:
        inset 0 0 0 10px rgba(255,255,255,0.08),
        inset 0 0 30px rgba(133, 68, 0, 0.22),
        0 12px 30px rgba(0,0,0,0.14);
    }

    .pizza-sauce::before {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: 9999px;
      background: radial-gradient(circle at 50% 40%, rgba(230,63,42,0.95), rgba(179,37,20,0.92));
      opacity: 0.95;
      z-index: 1;
    }

    .pizza-cheese::after {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 9999px;
      background:
        radial-gradient(circle at 40% 40%, rgba(255,245,187,0.9), rgba(255,221,103,0.82)),
        radial-gradient(circle at 60% 60%, rgba(255,255,255,0.18), rgba(255,255,255,0));
      z-index: 2;
      opacity: 0.95;
    }

    .pepperoni-piece {
      width: 14px;
      height: 14px;
      border-radius: 9999px;
      background: radial-gradient(circle at 35% 35%, #ff9a9a 0%, #d62828 45%, #9b111e 100%);
      border: 1.5px solid rgba(120, 0, 0, 0.35);
      box-shadow:
        inset 1px 1px 2px rgba(255,255,255,0.25),
        0 1px 2px rgba(0,0,0,0.18);
    }

    .panel {
      background: #ffffff;
      border-radius: 24px;
      border: 4px solid #fed7aa;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .panel-green {
      border-color: #bbf7d0;
    }

    .panel-blue {
      border-color: #bae6fd;
    }

    .btn {
      border-radius: 18px;
      font-weight: 900;
      transition: 0.15s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .input {
      width: 100%;
      border-radius: 18px;
      border: 2px solid #fed7aa;
      padding: 14px 16px;
      font-weight: 800;
      outline: none;
      background: white;
    }

    .input:focus {
      border-color: #fb923c;
      box-shadow: 0 0 0 4px rgba(251,146,60,0.12);
    }

    .break-anywhere {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBHLe_wG_zRkQTfz_1Rq2CGKrSSGDX4b10",
      authDomain: "pizza-economy-class.firebaseapp.com",
      projectId: "pizza-economy-class",
      storageBucket: "pizza-economy-class.firebasestorage.app",
      messagingSenderId: "253898972716",
      appId: "1:253898972716:web:5433d5ec549143c0f37b89"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const MAX_MAKING_BUDGET = 30000;
    const MAX_BUYING_BUDGET = 50000;
    const TOPPING_VISUAL_MULTIPLIER = 6;

    const INGREDIENTS = [
      { id: "edge_cheese", name: "치즈 크러스트", emoji: "🧀", price: 4000, category: "edge", max: 1 },
      { id: "edge_sweetpotato", name: "고구마 크러스트", emoji: "🍠", price: 4500, category: "edge", max: 1 },

      { id: "sauce_tomato", name: "토마토 소스", emoji: "🍅", price: 1500, category: "sauce", max: 1 },
      { id: "sauce_cream", name: "크림 소스", emoji: "🥛", price: 1800, category: "sauce", max: 1 },

      { id: "cheese_mozzarella", name: "모짜렐라 치즈", emoji: "🧀", price: 3000, category: "cheese", max: 1 },
      { id: "cheese_cheddar", name: "체다 치즈", emoji: "🟨", price: 3200, category: "cheese", max: 1 },

      { id: "top_pepperoni", name: "페퍼로니", emoji: "pepperoni", price: 3500, category: "topping" },
      { id: "top_mushroom", name: "버섯", emoji: "🍄", price: 2500, category: "topping" },
      { id: "top_olive", name: "올리브", emoji: "🫒", price: 2200, category: "topping" },
      { id: "top_pineapple", name: "파인애플", emoji: "🍍", price: 2800, category: "topping" },
      { id: "top_shrimp", name: "새우", emoji: "🍤", price: 4200, category: "topping" },
      { id: "top_bulgogi", name: "불고기", emoji: "🥩", price: 4300, category: "topping" },
      { id: "top_bacon", name: "베이컨", emoji: "🥓", price: 3900, category: "topping" },
      { id: "top_onion", name: "양파", emoji: "🧅", price: 1800, category: "topping" },
      { id: "top_potato", name: "감자", emoji: "🥔", price: 2400, category: "topping" },
      { id: "top_hanwoo", name: "한우", emoji: "🥩", price: 5200, category: "topping" },
      { id: "top_corn", name: "옥수수콘", emoji: "🌽", price: 2000, category: "topping" },
      { id: "top_sausage", name: "소시지", emoji: "🌭", price: 3400, category: "topping" },
      { id: "top_sweetpotatomousse", name: "고구마무스", emoji: "🍠", price: 3100, category: "topping" },
      { id: "top_paprika", name: "파프리카", emoji: "🫑", price: 2300, category: "topping" },
      { id: "top_chicken", name: "치킨", emoji: "🍗", price: 4100, category: "topping" },
      { id: "top_jalapeno", name: "할라피뇨", emoji: "🌶️", price: 2100, category: "topping" },
      { id: "top_tomato", name: "토마토", emoji: "🍅", price: 1900, category: "topping" },
      { id: "top_crabstick", name: "게맛살", emoji: "🦀", price: 3300, category: "topping" },

      { id: "side_pickle", name: "피클", emoji: "🥒", price: 1000, category: "side" },
      { id: "side_cola", name: "콜라", emoji: "🥤", price: 2000, category: "side" },
      { id: "side_salad", name: "샐러드", emoji: "🥗", price: 1800, category: "side" },
      { id: "side_garlicdip", name: "갈릭 디핑 소스", emoji: "🧄", price: 1200, category: "side" }
    ];

    const state = {
      authReady: false,
      user: null,

      screen: "start",   // start | teacher | student
      role: null,        // teacher | student
      roomId: "",
      roomData: null,

      teacherNameInput: "",
      studentRoomCodeInput: "",
      studentNameInput: "",

      teacherName: "",
      studentName: "",

      mySessionId: getOrCreateSessionId(),
      participants: [],
      pizzas: [],

      pizzaName: "",
      selectedIngredients: {},
      toppingLayout: {},

      myWallet: MAX_BUYING_BUDGET,
      myPurchasedPizzas: [],

      unsubscribers: [],
      toast: ""
    };

    function getOrCreateSessionId() {
      const key = "pizza_economy_student_session_id";
      const saved = localStorage.getItem(key);
      if (saved) return saved;
      const id = "student_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
      localStorage.setItem(key, id);
      return id;
    }

    function setToast(message) {
      state.toast = message;
      render();
      setTimeout(() => {
        if (state.toast === message) {
          state.toast = "";
          render();
        }
      }, 2200);
    }

    function roomsRef() {
      return db.collection("pizzaEconomyRooms");
    }

    function roomRef(roomId) {
      return roomsRef().doc(roomId);
    }

    function participantsRef(roomId) {
      return roomRef(roomId).collection("participants");
    }

    function pizzasRef(roomId) {
      return roomRef(roomId).collection("pizzas");
    }

    function cleanupSubscriptions() {
      state.unsubscribers.forEach((fn) => {
        try { fn(); } catch (e) {}
      });
      state.unsubscribers = [];
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function currency(value) {
      return Number(value || 0).toLocaleString("ko-KR") + "원";
    }

    function stageLabel(status) {
      if (status === "making") return "만들기";
      if (status === "selling") return "판매";
      if (status === "ranking") return "결과";
      return "-";
    }

    function randomRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 6; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    async function generateUniqueRoomCode() {
      for (let i = 0; i < 10; i++) {
        const code = randomRoomCode();
        const snap = await roomRef(code).get();
        if (!snap.exists) return code;
      }
      return randomRoomCode();
    }

    function getIngredientById(id) {
      return INGREDIENTS.find((x) => x.id === id);
    }

    function getSelectedEntries(obj = state.selectedIngredients) {
      return Object.entries(obj).filter(([_, count]) => Number(count) > 0);
    }

    function getIngredientCost(obj = state.selectedIngredients) {
      return getSelectedEntries(obj).reduce((sum, [id, count]) => {
        const item = getIngredientById(id);
        return sum + ((item?.price || 0) * Number(count || 0));
      }, 0);
    }

    function getCategorySingle(category, obj = state.selectedIngredients) {
      const found = getSelectedEntries(obj)
        .map(([id, count]) => ({ ...getIngredientById(id), count }))
        .find((x) => x && x.category === category);
      return found || null;
    }

    function getCategoryItems(category, obj = state.selectedIngredients) {
      return getSelectedEntries(obj)
        .map(([id, count]) => ({ ...getIngredientById(id), count }))
        .filter((x) => x && x.category === category);
    }

    function getMyParticipant() {
      return state.participants.find((p) => p.sessionId === state.mySessionId) || null;
    }

    function getMyPizza() {
      return state.pizzas.find((p) => p.ownerSessionId === state.mySessionId) || null;
    }

    function pizzaRevenue(pizza) {
      return (pizza.buyers?.length || 0) * Number(pizza.price || 0);
    }

    function sortedPizzasByRevenue() {
      return [...state.pizzas].sort((a, b) => {
        const revenueDiff = pizzaRevenue(b) - pizzaRevenue(a);
        if (revenueDiff !== 0) return revenueDiff;
        return (b.buyers?.length || 0) - (a.buyers?.length || 0);
      });
    }

    function clamp(v, min, max) {
      return Math.min(max, Math.max(min, v));
    }

    function buildExpandedToppings(selectedIngredients, toppingLayout) {
      const toppings = getCategoryItems("topping", selectedIngredients);
      const result = [];

      toppings.forEach((topping, toppingIndex) => {
        const totalPieces = Number(topping.count || 0) * TOPPING_VISUAL_MULTIPLIER;

        for (let i = 0; i < totalPieces; i++) {
          const key = topping.id + "_" + i;
          let pos = toppingLayout[key];

          if (!pos) {
            const angle = ((Math.PI * 2) / Math.max(totalPieces, 6)) * i + (toppingIndex * 0.33);
            const ring = 18 + ((i + toppingIndex) % 3) * 10;
            pos = {
              top: clamp(50 + Math.sin(angle) * ring * 0.85, 15, 85),
              left: clamp(50 + Math.cos(angle) * ring * 0.85, 15, 85),
              rotate: Math.floor((i * 31 + toppingIndex * 17) % 360)
            };
          }

          result.push({
            key,
            emoji: topping.emoji,
            isPepperoni: topping.id === "top_pepperoni",
            pos
          });
        }
      });

      return result;
    }

    function normalizeToppingLayout() {
      const expanded = buildExpandedToppings(state.selectedIngredients, state.toppingLayout);
      const validKeys = new Set(expanded.map((x) => x.key));
      const nextLayout = { ...state.toppingLayout };

      expanded.forEach((piece) => {
        if (!nextLayout[piece.key]) nextLayout[piece.key] = piece.pos;
      });

      Object.keys(nextLayout).forEach((key) => {
        if (!validKeys.has(key)) delete nextLayout[key];
      });

      state.toppingLayout = nextLayout;
    }

    async function initAuth() {
      try {
        await auth.signInAnonymously();
      } catch (err) {
        console.error(err);
        setToast("익명 로그인 실패");
      }

      auth.onAuthStateChanged((user) => {
        state.user = user || null;
        state.authReady = true;
        render();
      });
    }

    async function createTeacherRoom() {
      if (!state.user) {
        setToast("로그인 준비 중입니다.");
        return;
      }

      const teacherName = state.teacherNameInput.trim() || "선생님";

      try {
        const roomId = await generateUniqueRoomCode();

        await roomRef(roomId).set({
          roomId,
          teacherUid: state.user.uid,
          teacherName,
          status: "making",
          createdAt: Date.now()
        });

        state.role = "teacher";
        state.screen = "teacher";
        state.roomId = roomId;
        state.teacherName = teacherName;
        state.roomData = null;
        state.participants = [];
        state.pizzas = [];

        await subscribeToRoom(roomId);

        setToast("방이 만들어졌습니다.");
      } catch (err) {
        console.error(err);
        setToast("방 만들기 실패");
      }
    }

    async function joinStudentRoom() {
      if (!state.user) {
        setToast("로그인 준비 중입니다.");
        return;
      }

      const roomCode = state.studentRoomCodeInput.trim().toUpperCase();
      const studentName = state.studentNameInput.trim();

      if (!roomCode) {
        setToast("방 코드를 입력해 주세요.");
        return;
      }

      if (!studentName) {
        setToast("학생 이름을 입력해 주세요.");
        return;
      }

      try {
        const roomSnap = await roomRef(roomCode).get();

        if (!roomSnap.exists) {
          setToast("방 코드를 찾을 수 없습니다.");
          return;
        }

        const roomData = roomSnap.data();

        await participantsRef(roomCode).doc(state.mySessionId).set({
          sessionId: state.mySessionId,
          uid: state.user.uid,
          name: studentName,
          wallet: MAX_BUYING_BUDGET,
          purchasedPizzas: [],
          joinedAt: Date.now(),
          lastEnteredAt: Date.now()
        }, { merge: true });

        state.role = "student";
        state.screen = "student";
        state.roomId = roomCode;
        state.studentName = studentName;
        state.roomData = { id: roomSnap.id, ...roomData };
        state.pizzas = [];
        state.participants = [];

        await subscribeToRoom(roomCode);

        setToast("학생으로 입장했습니다.");
      } catch (err) {
        console.error(err);
        setToast("학생 입장 실패");
      }
    }

    async function subscribeToRoom(roomId) {
      cleanupSubscriptions();

      const unsubRoom = roomRef(roomId).onSnapshot((snap) => {
        if (!snap.exists) {
          state.roomData = null;
          render();
          return;
        }
        state.roomData = { id: snap.id, ...snap.data() };

        if (state.role === "student") {
          const teacherUid = state.roomData.teacherUid || "";
          if (state.user && state.user.uid === teacherUid) {
            // 같은 브라우저에서 교사 uid와 학생 uid가 같으면 학생 화면 유지
          }
        }

        render();
      });

      const unsubParticipants = participantsRef(roomId).onSnapshot((snap) => {
        state.participants = snap.docs.map((d) => ({ id: d.id, ...d.data() }));

        if (state.role === "student") {
          const me = getMyParticipant();
          if (me) {
            state.myWallet = Number(me.wallet || 0);
            state.myPurchasedPizzas = Array.isArray(me.purchasedPizzas) ? me.purchasedPizzas : [];
            if (!state.studentName) state.studentName = me.name || "";
          }
        }

        render();
      });

      const unsubPizzas = pizzasRef(roomId).onSnapshot((snap) => {
        state.pizzas = snap.docs.map((d) => ({ id: d.id, ...d.data() }));

        if (state.role === "student") {
          const myPizza = getMyPizza();
          if (myPizza) {
            state.pizzaName = myPizza.pizzaName || "";
            state.selectedIngredients = myPizza.selectedIngredients || {};
            state.toppingLayout = myPizza.toppingLayout || {};
          }
        }

        render();
      });

      state.unsubscribers.push(unsubRoom, unsubParticipants, unsubPizzas);
    }

    async function setRoomStatus(nextStatus) {
      if (state.role !== "teacher" || !state.roomId) return;

      try {
        await roomRef(state.roomId).update({
          status: nextStatus
        });
      } catch (err) {
        console.error(err);
        setToast("단계 변경 실패");
      }
    }

    function changeIngredientCount(ingredientId, delta) {
      const item = getIngredientById(ingredientId);
      if (!item) return;

      const next = { ...state.selectedIngredients };
      const current = Number(next[ingredientId] || 0);

      if (item.category === "topping" || item.category === "side") {
        const nextCount = Math.max(0, current + delta);
        if (nextCount === 0) delete next[ingredientId];
        else next[ingredientId] = nextCount;
      } else {
        if (delta > 0) {
          Object.keys(next).forEach((id) => {
            const found = getIngredientById(id);
            if (found && found.category === item.category) delete next[id];
          });
          next[ingredientId] = 1;
        } else {
          delete next[ingredientId];
        }
      }

      const nextCost = getIngredientCost(next);

      if (nextCost > MAX_MAKING_BUDGET) {
        setToast("재료비는 30,000원을 넘을 수 없습니다.");
        return;
      }

      state.selectedIngredients = next;
      normalizeToppingLayout();
      render();
    }

    async function saveMyPizza() {
      if (state.role !== "student" || !state.roomId) return;

      const pizzaName = state.pizzaName.trim();
      if (!pizzaName) {
        setToast("피자 이름을 입력해 주세요.");
        return;
      }

      const totalCost = getIngredientCost();

      try {
        await pizzasRef(state.roomId).doc(state.mySessionId).set({
          ownerSessionId: state.mySessionId,
          ownerName: state.studentName,
          pizzaName,
          selectedIngredients: state.selectedIngredients,
          toppingLayout: state.toppingLayout,
          ingredientCost: totalCost,
          price: totalCost,
          buyers: [],
          updatedAt: Date.now(),
          createdAt: getMyPizza()?.createdAt || Date.now()
        }, { merge: true });

        setToast("피자를 제출했습니다.");
      } catch (err) {
        console.error(err);
        setToast("피자 저장 실패");
      }
    }

    async function buyPizza(pizzaId) {
      if (state.role !== "student" || !state.roomId) return;

      const currentStatus = state.roomData?.status || "";
      if (currentStatus !== "selling") {
        setToast("지금은 판매 단계가 아닙니다.");
        return;
      }

      const pizza = state.pizzas.find((p) => p.id === pizzaId);
      if (!pizza) {
        setToast("피자를 찾을 수 없습니다.");
        return;
      }

      if (pizza.ownerSessionId === state.mySessionId) {
        setToast("내 피자는 구매할 수 없습니다.");
        return;
      }

      if (state.myWallet < Number(pizza.price || 0)) {
        setToast("예산이 부족합니다.");
        return;
      }

      try {
        const pizzaDoc = pizzasRef(state.roomId).doc(pizzaId);
        const meDoc = participantsRef(state.roomId).doc(state.mySessionId);

        await db.runTransaction(async (tx) => {
          const pizzaSnap = await tx.get(pizzaDoc);
          const meSnap = await tx.get(meDoc);

          if (!pizzaSnap.exists) throw new Error("pizza_not_found");
          if (!meSnap.exists) throw new Error("buyer_not_found");

          const pizzaData = pizzaSnap.data();
          const meData = meSnap.data();

          const wallet = Number(meData.wallet || 0);
          const price = Number(pizzaData.price || 0);

          if (wallet < price) throw new Error("not_enough_money");

          const purchasedPizzas = Array.isArray(meData.purchasedPizzas) ? [...meData.purchasedPizzas] : [];
          purchasedPizzas.push({
            pizzaId: pizzaSnap.id,
            pizzaName: pizzaData.pizzaName,
            ownerName: pizzaData.ownerName,
            price,
            boughtAt: Date.now()
          });

          const buyers = Array.isArray(pizzaData.buyers) ? [...pizzaData.buyers] : [];
          buyers.push({
            sessionId: state.mySessionId,
            name: state.studentName,
            boughtAt: Date.now()
          });

          tx.update(meDoc, {
            wallet: wallet - price,
            purchasedPizzas
          });

          tx.update(pizzaDoc, {
            buyers
          });
        });

        setToast("구매 완료");
      } catch (err) {
        console.error(err);
        if (err.message === "not_enough_money") {
          setToast("예산이 부족합니다.");
        } else {
          setToast("구매 실패");
        }
      }
    }

    function renderPizzaView(options = {}) {
      const ingredients = options.ingredients || {};
      const toppingLayout = options.toppingLayout || {};
      const interactive = !!options.interactive;
      const pizzaId = options.pizzaId || "editor";
      const size = options.size || "large";

      const edge = getCategorySingle("edge", ingredients);
      const sauce = getCategorySingle("sauce", ingredients);
      const cheese = getCategorySingle("cheese", ingredients);
      const sides = getCategoryItems("side", ingredients);
      const toppings = buildExpandedToppings(ingredients, toppingLayout);

      const wrapperClass = size === "large"
        ? "w-80 h-80 md:w-96 md:h-96"
        : "w-44 h-44 md:w-52 md:h-52";

      const toppingTextClass = size === "large" ? "text-[22px]" : "text-[12px]";

      let toppingHtml = "";
      toppings.forEach((piece) => {
        toppingHtml += `
          <div
            class="pizza-piece absolute z-20 select-none ${interactive ? "cursor-grab active:cursor-grabbing" : ""} ${toppingTextClass}"
            data-pizza-id="${escapeHtml(pizzaId)}"
            data-piece-key="${escapeHtml(piece.key)}"
            style="top:${piece.pos.top}%; left:${piece.pos.left}%; transform:translate(-50%, -50%) rotate(${piece.pos.rotate}deg); line-height:1; touch-action:${interactive ? "none" : "auto"};"
          >
            ${piece.isPepperoni ? `<div class="pepperoni-piece"></div>` : escapeHtml(piece.emoji)}
          </div>
        `;
      });

      return `
        <div class="flex flex-col items-center gap-3">
          <div class="relative ${wrapperClass}">
            <div class="absolute inset-0 rounded-full pizza-base border-[10px] ${edge ? "border-amber-800" : "border-amber-500"} ${sauce ? "pizza-sauce" : ""} ${cheese ? "pizza-cheese" : ""}"></div>
            ${toppingHtml}
          </div>
          <div class="flex flex-wrap justify-center gap-2">
            ${sides.map((side) => `
              <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-orange-50 border border-orange-200 text-xs font-black">
                ${escapeHtml(side.emoji)} ${escapeHtml(side.name)} x${escapeHtml(side.count)}
              </span>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderStartScreen() {
      return `
        <main class="min-h-screen flex items-center justify-center px-4 py-10">
          <div class="w-full max-w-6xl grid lg:grid-cols-2 gap-6">
            <section class="panel p-8">
              <h1 class="text-4xl md:text-5xl font-black text-orange-600">피자나라 경제교실</h1>
              <p class="mt-4 text-slate-600 font-bold leading-relaxed">
                교사는 방 만들기 버튼으로 방을 생성하고,<br />
                학생은 방 코드와 이름을 입력해 입장합니다.
              </p>
            </section>

            <div class="space-y-6">
              <section class="panel p-6">
                <h2 class="text-2xl font-black text-orange-700">교사</h2>
                <input id="teacher-name-input" class="input mt-4" placeholder="선생님 이름" value="${escapeHtml(state.teacherNameInput)}" />
                <button id="teacher-create-room-btn" class="btn mt-4 w-full py-4 bg-orange-500 hover:bg-orange-600 text-white">
                  방 만들기
                </button>
              </section>

              <section class="panel panel-green p-6">
                <h2 class="text-2xl font-black text-emerald-700">학생</h2>
                <input id="student-room-code-input" class="input mt-4 uppercase" placeholder="방 코드" value="${escapeHtml(state.studentRoomCodeInput)}" />
                <input id="student-name-input" class="input mt-3" placeholder="학생 이름" value="${escapeHtml(state.studentNameInput)}" />
                <button id="student-join-room-btn" class="btn mt-4 w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white">
                  학생으로 입장하기
                </button>
              </section>
            </div>
          </div>
        </main>
      `;
    }

    function renderTeacherScreen() {
      const status = state.roomData?.status || "making";
      const ranking = sortedPizzasByRevenue();

      return `
        <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
          <section class="panel p-6">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
              <div>
                <p class="text-sm font-black text-slate-500">학생에게 보여줄 방 코드</p>
                <div class="text-5xl font-black tracking-widest text-orange-600 mt-2">${escapeHtml(state.roomId)}</div>
                <p class="mt-3 text-slate-600 font-bold">현재 단계: ${escapeHtml(stageLabel(status))}</p>
              </div>
              <div class="text-sm font-bold text-slate-500">
                교사: ${escapeHtml(state.teacherName || state.roomData?.teacherName || "선생님")}
              </div>
            </div>
          </section>

          <section class="grid md:grid-cols-3 gap-4">
            <button id="btn-stage-making" class="btn py-4 border-4 ${status === "making" ? "bg-orange-500 text-white border-orange-500" : "bg-white text-orange-700 border-orange-200"}">만들기</button>
            <button id="btn-stage-selling" class="btn py-4 border-4 ${status === "selling" ? "bg-emerald-500 text-white border-emerald-500" : "bg-white text-emerald-700 border-emerald-200"}">판매</button>
            <button id="btn-stage-ranking" class="btn py-4 border-4 ${status === "ranking" ? "bg-sky-500 text-white border-sky-500" : "bg-white text-sky-700 border-sky-200"}">결과</button>
          </section>

          <section class="grid lg:grid-cols-2 gap-6">
            <div class="panel p-5">
              <h3 class="text-xl font-black">학생 목록</h3>
              <div class="mt-4 space-y-3">
                ${state.participants.length
                  ? state.participants.map((p, index) => `
                    <div class="rounded-2xl bg-orange-50 border border-orange-200 px-4 py-3 flex justify-between items-center gap-3">
                      <div class="font-black break-anywhere">${index + 1}. ${escapeHtml(p.name || "")}</div>
                      <div class="font-bold text-slate-600">${currency(p.wallet || 0)}</div>
                    </div>
                  `).join("")
                  : `<div class="text-slate-500 font-bold">아직 학생이 없습니다.</div>`
                }
              </div>
            </div>

            <div class="panel panel-green p-5">
              <h3 class="text-xl font-black">피자 목록</h3>
              <div class="mt-4 space-y-3">
                ${state.pizzas.length
                  ? state.pizzas.map((pizza, index) => `
                    <div class="rounded-2xl bg-emerald-50 border border-emerald-200 px-4 py-3">
                      <div class="font-black break-anywhere">${index + 1}. ${escapeHtml(pizza.pizzaName || "")}</div>
                      <div class="text-sm font-bold text-slate-600 mt-1">
                        ${escapeHtml(pizza.ownerName || "")} · 원가 ${currency(pizza.price || 0)} · 매출 ${currency(pizzaRevenue(pizza))}
                      </div>
                    </div>
                  `).join("")
                  : `<div class="text-slate-500 font-bold">아직 제출된 피자가 없습니다.</div>`
                }
              </div>
            </div>
          </section>

          ${status === "ranking" ? `
            <section class="panel panel-blue p-5">
              <h3 class="text-2xl font-black">최종 순위</h3>
              <div class="mt-4 grid md:grid-cols-3 gap-4">
                ${ranking.slice(0, 3).map((pizza, index) => `
                  <div class="rounded-3xl p-5 border-2 ${
                    index === 0 ? "bg-yellow-50 border-yellow-300" :
                    index === 1 ? "bg-slate-50 border-slate-300" :
                    "bg-orange-50 border-orange-300"
                  }">
                    <div class="text-3xl font-black">${
                      index === 0 ? "🥇" : index === 1 ? "🥈" : "🥉"
                    }</div>
                    <div class="mt-3 font-black text-lg break-anywhere">${escapeHtml(pizza.pizzaName || "")}</div>
                    <div class="mt-1 text-sm font-bold text-slate-600">${escapeHtml(pizza.ownerName || "")}</div>
                    <div class="mt-2 text-emerald-600 font-black">${currency(pizzaRevenue(pizza))}</div>
                  </div>
                `).join("") || `<div class="md:col-span-3 text-slate-500 font-bold">아직 결과가 없습니다.</div>`}
              </div>
            </section>
          ` : ""}
        </main>
      `;
    }

    function renderIngredientCard(item) {
      const count = Number(state.selectedIngredients[item.id] || 0);
      return `
        <div class="rounded-2xl border-2 border-orange-200 bg-white px-4 py-3">
          <div class="flex items-start justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="text-2xl">${item.emoji === "pepperoni" ? "🔴" : escapeHtml(item.emoji)}</div>
              <div>
                <div class="font-black text-sm">${escapeHtml(item.name)}</div>
                <div class="text-xs font-black text-emerald-600 mt-1">${currency(item.price)}${item.category === "topping" ? " / 1" : ""}</div>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <button class="ingredient-minus w-9 h-9 rounded-xl border-2 border-orange-200 bg-orange-50 font-black" data-ingredient-id="${escapeHtml(item.id)}">-</button>
              <div class="min-w-[52px] text-center rounded-xl bg-slate-50 border border-slate-200 px-2 py-2 font-black text-sm">${count}</div>
              <button class="ingredient-plus w-9 h-9 rounded-xl border-2 border-orange-200 bg-orange-50 font-black" data-ingredient-id="${escapeHtml(item.id)}">+1</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderStudentMaking() {
      const totalCost = getIngredientCost();

      return `
        <section class="grid xl:grid-cols-12 gap-6">
          <div class="xl:col-span-5 panel p-5">
            <div class="flex items-center justify-between gap-4 mb-4">
              <h3 class="text-xl font-black">내 피자 만들기</h3>
              <div class="text-right">
                <div class="text-xs font-black text-slate-500">재료비</div>
                <div class="text-lg font-black text-emerald-600">${currency(totalCost)} / ${currency(MAX_MAKING_BUDGET)}</div>
              </div>
            </div>

            <input id="pizza-name-input" class="input" placeholder="피자 이름" value="${escapeHtml(state.pizzaName)}" />

            <div class="mt-4 rounded-3xl bg-gradient-to-b from-orange-50 to-amber-50 border-2 border-orange-200 p-4">
              ${renderPizzaView({
                ingredients: state.selectedIngredients,
                toppingLayout: state.toppingLayout,
                interactive: true,
                size: "large",
                pizzaId: "editor"
              })}
            </div>

            <button id="save-my-pizza-btn" class="btn mt-4 w-full py-4 bg-orange-500 hover:bg-orange-600 text-white">
              제출하기
            </button>
          </div>

          <div class="xl:col-span-7 panel p-5">
            <div class="space-y-5">
              ${["edge", "sauce", "cheese", "topping", "side"].map((category) => `
                <div>
                  <h4 class="text-sm font-black text-slate-700 mb-3">${escapeHtml(category)}</h4>
                  <div class="grid md:grid-cols-2 gap-3">
                    ${INGREDIENTS.filter((x) => x.category === category).map(renderIngredientCard).join("")}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderStudentSelling() {
      const marketPizzas = state.pizzas.filter((pizza) => pizza.ownerSessionId !== state.mySessionId);

      return `
        <section class="space-y-6">
          <div class="panel panel-green p-5">
            <h3 class="text-xl font-black">피자 구매하기</h3>
            <div class="mt-2 text-sm font-bold text-slate-600">
              남은 예산: <span class="text-emerald-600">${currency(state.myWallet)}</span>
            </div>
          </div>

          <div class="grid lg:grid-cols-2 gap-5">
            ${marketPizzas.length
              ? marketPizzas.map((pizza) => `
                <article class="panel p-5">
                  <div class="text-xs font-black text-orange-700">판매자: ${escapeHtml(pizza.ownerName || "")}</div>
                  <h4 class="text-xl font-black mt-1 break-anywhere">${escapeHtml(pizza.pizzaName || "")}</h4>
                  <div class="text-sm text-slate-500 font-bold mt-1">가격 ${currency(pizza.price || 0)}</div>

                  <div class="mt-4 rounded-3xl bg-orange-50 border border-orange-200 p-4">
                    ${renderPizzaView({
                      ingredients: pizza.selectedIngredients || {},
                      toppingLayout: pizza.toppingLayout || {},
                      interactive: false,
                      size: "small",
                      pizzaId: pizza.id
                    })}
                  </div>

                  <button class="buy-pizza-btn btn mt-4 w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white" data-pizza-id="${escapeHtml(pizza.id)}">
                    구매하기
                  </button>
                </article>
              `).join("")
              : `
                <div class="lg:col-span-2 panel p-10 text-center">
                  <div class="text-lg font-black text-slate-500">아직 판매 중인 피자가 없습니다.</div>
                </div>
              `
            }
          </div>
        </section>
      `;
    }

    function renderStudentRanking() {
      const ranked = sortedPizzasByRevenue();

      return `
        <section class="space-y-6">
          <div class="panel panel-blue p-5">
            <h3 class="text-2xl font-black">결과 보기</h3>
          </div>

          <div class="panel p-5">
            <div class="space-y-3">
              ${ranked.length
                ? ranked.map((pizza, index) => `
                  <div class="rounded-2xl bg-orange-50 border border-orange-200 px-4 py-4">
                    <div class="font-black">${index + 1}위 · ${escapeHtml(pizza.pizzaName || "")}</div>
                    <div class="text-sm font-bold text-slate-600 mt-1">
                      ${escapeHtml(pizza.ownerName || "")} · 매출 ${currency(pizzaRevenue(pizza))}
                    </div>
                  </div>
                `).join("")
                : `<div class="text-slate-500 font-bold">아직 결과가 없습니다.</div>`
              }
            </div>
          </div>
        </section>
      `;
    }

    function renderStudentScreen() {
      const status = state.roomData?.status || "making";

      return `
        <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
          <section class="panel p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <div class="text-lg font-black text-orange-600">${escapeHtml(state.studentName || "학생")}</div>
              <div class="text-sm font-bold text-slate-600 mt-1">방 코드: ${escapeHtml(state.roomId)}</div>
              <div class="text-sm font-bold text-slate-600">현재 단계: <span class="text-emerald-600">${escapeHtml(stageLabel(status))}</span></div>
            </div>

            <div class="px-4 py-2 rounded-2xl bg-emerald-50 border border-emerald-200">
              <div class="text-xs font-black text-emerald-700">내 구매 예산</div>
              <div class="font-black">${currency(state.myWallet)}</div>
            </div>
          </section>

          ${status === "making" ? renderStudentMaking() : ""}
          ${status === "selling" ? renderStudentSelling() : ""}
          ${status === "ranking" ? renderStudentRanking() : ""}
        </main>
      `;
    }

    function renderToast() {
      if (!state.toast) return "";
      return `
        <div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl bg-slate-900 text-white shadow-2xl font-black text-sm">
          ${escapeHtml(state.toast)}
        </div>
      `;
    }

    function render() {
      let html = "";

      if (!state.authReady) {
        html = `
          <div class="min-h-screen flex items-center justify-center px-4">
            <div class="panel p-8 text-center">
              <div class="text-xl font-black text-orange-600">로그인 준비 중...</div>
            </div>
          </div>
        `;
      } else if (state.screen === "start") {
        html = renderStartScreen();
      } else if (state.screen === "teacher") {
        html = renderTeacherScreen();
      } else if (state.screen === "student") {
        html = renderStudentScreen();
      }

      html += renderToast();

      document.getElementById("app").innerHTML = html;
      bindEvents();
      attachToppingDragEvents();
    }

    function bindEvents() {
      const teacherNameInput = document.getElementById("teacher-name-input");
      if (teacherNameInput) {
        teacherNameInput.addEventListener("input", (e) => {
          state.teacherNameInput = e.target.value;
        });
      }

      const studentRoomCodeInput = document.getElementById("student-room-code-input");
      if (studentRoomCodeInput) {
        studentRoomCodeInput.addEventListener("input", (e) => {
          state.studentRoomCodeInput = String(e.target.value || "").toUpperCase();
        });
      }

      const studentNameInput = document.getElementById("student-name-input");
      if (studentNameInput) {
        studentNameInput.addEventListener("input", (e) => {
          state.studentNameInput = e.target.value;
        });
      }

      const teacherCreateRoomBtn = document.getElementById("teacher-create-room-btn");
      if (teacherCreateRoomBtn) {
        teacherCreateRoomBtn.addEventListener("click", createTeacherRoom);
      }

      const studentJoinRoomBtn = document.getElementById("student-join-room-btn");
      if (studentJoinRoomBtn) {
        studentJoinRoomBtn.addEventListener("click", joinStudentRoom);
      }

      const btnStageMaking = document.getElementById("btn-stage-making");
      if (btnStageMaking) {
        btnStageMaking.addEventListener("click", () => setRoomStatus("making"));
      }

      const btnStageSelling = document.getElementById("btn-stage-selling");
      if (btnStageSelling) {
        btnStageSelling.addEventListener("click", () => setRoomStatus("selling"));
      }

      const btnStageRanking = document.getElementById("btn-stage-ranking");
      if (btnStageRanking) {
        btnStageRanking.addEventListener("click", () => setRoomStatus("ranking"));
      }

      const pizzaNameInput = document.getElementById("pizza-name-input");
      if (pizzaNameInput) {
        pizzaNameInput.addEventListener("input", (e) => {
          state.pizzaName = e.target.value;
        });
      }

      const saveMyPizzaBtn = document.getElementById("save-my-pizza-btn");
      if (saveMyPizzaBtn) {
        saveMyPizzaBtn.addEventListener("click", saveMyPizza);
      }

      document.querySelectorAll(".ingredient-plus").forEach((btn) => {
        btn.addEventListener("click", () => {
          changeIngredientCount(btn.dataset.ingredientId, 1);
        });
      });

      document.querySelectorAll(".ingredient-minus").forEach((btn) => {
        btn.addEventListener("click", () => {
          changeIngredientCount(btn.dataset.ingredientId, -1);
        });
      });

      document.querySelectorAll(".buy-pizza-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          buyPizza(btn.dataset.pizzaId);
        });
      });
    }

    function attachToppingDragEvents() {
      const pieces = document.querySelectorAll(".pizza-piece");

      pieces.forEach((piece) => {
        if (piece.dataset.pizzaId !== "editor") return;

        let dragging = false;
        let lastX = 0;
        let lastY = 0;

        piece.addEventListener("pointerdown", (e) => {
          dragging = true;
          lastX = e.clientX;
          lastY = e.clientY;
          try { piece.setPointerCapture(e.pointerId); } catch (err) {}
        });

        piece.addEventListener("pointermove", (e) => {
          if (!dragging) return;

          const parent = piece.parentElement;
          if (!parent) return;

          const rect = parent.getBoundingClientRect();
          const dx = e.clientX - lastX;
          const dy = e.clientY - lastY;
          lastX = e.clientX;
          lastY = e.clientY;

          const key = piece.dataset.pieceKey;
          if (!state.toppingLayout[key]) return;

          state.toppingLayout[key].left = clamp(state.toppingLayout[key].left + (dx / rect.width) * 100, 8, 92);
          state.toppingLayout[key].top = clamp(state.toppingLayout[key].top + (dy / rect.height) * 100, 8, 92);

          piece.style.left = state.toppingLayout[key].left + "%";
          piece.style.top = state.toppingLayout[key].top + "%";
        });

        const stopDrag = (e) => {
          if (!dragging) return;
          dragging = false;
          try { piece.releasePointerCapture(e.pointerId); } catch (err) {}
        };

        piece.addEventListener("pointerup", stopDrag);
        piece.addEventListener("pointercancel", stopDrag);
      });
    }

    (async function boot() {
      render();
      await initAuth();
      render();
    })();
  </script>
</body>
</html>
