<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>피자나라 경제교실</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: "Pretendard", "Noto Sans KR", system-ui, -apple-system, sans-serif;
    }

    .pizza-base {
      background:
        radial-gradient(circle at 50% 50%, #ffd98f 0%, #ffc96e 62%, #dd8f3e 63%, #bf6d21 77%, #8a4d17 100%);
      box-shadow:
        inset 0 0 0 10px rgba(255,255,255,0.08),
        inset 0 0 30px rgba(133, 68, 0, 0.22),
        0 12px 30px rgba(0,0,0,0.14);
    }

    .pizza-sauce::before {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: 9999px;
      background: radial-gradient(circle at 50% 40%, rgba(230,63,42,0.95), rgba(179,37,20,0.92));
      opacity: 0.95;
      z-index: 1;
    }

    .pizza-cheese::after {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 9999px;
      background:
        radial-gradient(circle at 40% 40%, rgba(255,245,187,0.9), rgba(255,221,103,0.82)),
        radial-gradient(circle at 60% 60%, rgba(255,255,255,0.18), rgba(255,255,255,0));
      z-index: 2;
      opacity: 0.95;
    }

    .report-page {
      width: 816px;
      min-height: 1056px;
      background: white;
      color: #0f172a;
      padding: 32px;
      box-sizing: border-box;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-amber-50 to-orange-100 min-h-screen text-slate-800">
  <div id="app"></div>

  <script>
    // =========================================================
    // 1. Firebase 및 글로벌 환경 설정
    // =========================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBHLe_wG_zRkQTfz_1Rq2CGKrSSGDX4b10",
      authDomain: "pizza-economy-class.firebaseapp.com",
      projectId: "pizza-economy-class",
      storageBucket: "pizza-economy-class.firebasestorage.app",
      messagingSenderId: "253898972716",
      appId: "1:253898972716:web:5433d5ec549143c0f37b89"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = "pizza-economy-class";

    // =========================================================
    // 2. 기본 상수 / 상태
    // =========================================================
    const MAX_MAKING_BUDGET = 30000;
    const MAX_BUYING_BUDGET = 50000;

    const ROOM_COLLECTION = () =>
      db.collection("artifacts").doc(appId).collection("public").doc("data").collection("rooms");

    const INGREDIENTS = [
      { id: "edge_cheese", name: "치즈 크러스트", emoji: "🧀", price: 4000, category: "edge" },
      { id: "edge_sweetpotato", name: "고구마 크러스트", emoji: "🍠", price: 4500, category: "edge" },

      { id: "sauce_tomato", name: "토마토 소스", emoji: "🍅", price: 1500, category: "sauce" },
      { id: "sauce_cream", name: "크림 소스", emoji: "🥛", price: 1800, category: "sauce" },

      { id: "cheese_mozzarella", name: "모짜렐라 치즈", emoji: "🧀", price: 3000, category: "cheese" },
      { id: "cheese_cheddar", name: "체다 치즈", emoji: "🟨", price: 3200, category: "cheese" },

      { id: "top_pepperoni", name: "페퍼로니", emoji: "🍕", price: 3500, category: "topping", pieces: 8 },
      { id: "top_mushroom", name: "버섯", emoji: "🍄", price: 2500, category: "topping", pieces: 8 },
      { id: "top_olive", name: "올리브", emoji: "🫒", price: 2200, category: "topping", pieces: 10 },
      { id: "top_pineapple", name: "파인애플", emoji: "🍍", price: 2800, category: "topping", pieces: 8 },
      { id: "top_shrimp", name: "새우", emoji: "🍤", price: 4200, category: "topping", pieces: 7 },
      { id: "top_bulgogi", name: "불고기", emoji: "🥩", price: 4300, category: "topping", pieces: 7 },
      { id: "top_corn", name: "옥수수", emoji: "🌽", price: 2000, category: "topping", pieces: 10 },
      { id: "top_broccoli", name: "브로콜리", emoji: "🥦", price: 2300, category: "topping", pieces: 8 },
      { id: "top_bacon", name: "베이컨", emoji: "🥓", price: 3900, category: "topping", pieces: 7 },
      { id: "top_onion", name: "양파", emoji: "🧅", price: 1800, category: "topping", pieces: 9 },

      { id: "side_pickle", name: "피클", emoji: "🥒", price: 1000, category: "side" },
      { id: "side_cola", name: "콜라", emoji: "🥤", price: 2000, category: "side" },
      { id: "side_rice", name: "밥", emoji: "🍚", price: 1500, category: "side" },
      { id: "side_salad", name: "샐러드", emoji: "🥗", price: 1800, category: "side" }
    ];

    const CATEGORY_LABEL = {
      edge: "도우/엣지",
      sauce: "소스",
      cheese: "치즈",
      topping: "토핑",
      side: "사이드"
    };

    const state = {
      user: null,
      authReady: false,

      role: null, // teacher | student
      activeTab: "main",

      currentRoomId: null,
      roomData: null,
      participants: [],
      pizzas: [],

      roomCodeInput: "",
      studentName: "",
      teacherDisplayName: "교사",

      pizzaName: "",
      selectedIngredients: [],
      toppingLayout: {},
      priceInput: 12000,
      hasSubmitted: false,

      buyerWallet: MAX_BUYING_BUDGET,
      purchasedPizzas: [],

      alertMessage: null,
      activeQuiz: null,
      makingQuizAnswer: null,

      unsubscribers: [],
      reportVisible: false
    };

    // =========================================================
    // 3. 세션 기반 학생 ID
    // =========================================================
    const STUDENT_SESSION_ID = (() => {
      const key = "pizza_student_session_id";
      const saved = sessionStorage.getItem(key);
      if (saved) return saved;
      const newId = `student_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      sessionStorage.setItem(key, newId);
      return newId;
    })();

    // =========================================================
    // 4. 유틸
    // =========================================================
    function $(selector) {
      return document.querySelector(selector);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function showAlert(message) {
      state.alertMessage = message;
      render();
      setTimeout(() => {
        if (state.alertMessage === message) {
          state.alertMessage = null;
          render();
        }
      }, 2200);
    }

    function currency(value) {
      return `${Number(value || 0).toLocaleString("ko-KR")}원`;
    }

    function makeRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let s = "";
      for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
      return s;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getIngredientById(id) {
      return INGREDIENTS.find((x) => x.id === id);
    }

    function getSelectedIngredientObjects(ids) {
      return ids.map(getIngredientById).filter(Boolean);
    }

    function calculateIngredientCost(ids) {
      return getSelectedIngredientObjects(ids).reduce((sum, item) => sum + item.price, 0);
    }

    function categoryItems(category) {
      return INGREDIENTS.filter((x) => x.category === category);
    }

    function countByCategory(ids, category) {
      return getSelectedIngredientObjects(ids).filter((x) => x.category === category).length;
    }

    function hasCategory(ids, category) {
      return countByCategory(ids, category) > 0;
    }

    function selectedPizzaToppings(ids) {
      return getSelectedIngredientObjects(ids).filter((x) => x.category === "topping");
    }

    function selectedSides(ids) {
      return getSelectedIngredientObjects(ids).filter((x) => x.category === "side");
    }

    function selectedPrimary(ids, category) {
      return getSelectedIngredientObjects(ids).find((x) => x.category === category);
    }

    function revenueOfPizza(pizza) {
      return (pizza.buyers?.length || 0) * (pizza.price || 0);
    }

    function sortedPizzas() {
      return [...state.pizzas].sort((a, b) => {
        const aRevenue = revenueOfPizza(a);
        const bRevenue = revenueOfPizza(b);
        if (bRevenue !== aRevenue) return bRevenue - aRevenue;
        const aCount = a.buyers?.length || 0;
        const bCount = b.buyers?.length || 0;
        return bCount - aCount;
      });
    }

    function totalTransactions() {
      return state.pizzas.reduce((sum, p) => sum + (p.buyers?.length || 0), 0);
    }

    function totalMarketRevenue() {
      return state.pizzas.reduce((sum, p) => sum + revenueOfPizza(p), 0);
    }

    function getMyParticipant() {
      return state.participants.find((p) => p.sessionId === STUDENT_SESSION_ID) || null;
    }

    function getMyPizza() {
      return state.pizzas.find((p) => p.ownerSessionId === STUDENT_SESSION_ID) || null;
    }

    function roomRef(roomId) {
      return ROOM_COLLECTION().doc(roomId);
    }

    function participantsRef(roomId) {
      return roomRef(roomId).collection("participants");
    }

    function pizzasRef(roomId) {
      return roomRef(roomId).collection("pizzas");
    }

    function cleanupSubscriptions() {
      state.unsubscribers.forEach((fn) => {
        try { fn(); } catch (e) {}
      });
      state.unsubscribers = [];
    }

    function getDefaultToppingLayout(ids) {
      const toppings = selectedPizzaToppings(ids);
      const layout = {};

      toppings.forEach((ing, tIndex) => {
        const pieceCount = ing.pieces || 8;
        for (let i = 0; i < pieceCount; i++) {
          const angle = ((Math.PI * 2) / pieceCount) * i + (tIndex * 0.35);
          const ring = 18 + ((i + tIndex) % 3) * 10;
          const top = 50 + Math.sin(angle) * ring * 0.85;
          const left = 50 + Math.cos(angle) * ring * 0.85;
          layout[`${ing.id}_${i}`] = {
            top: clamp(top, 15, 85),
            left: clamp(left, 15, 85),
            rotate: Math.floor((i * 29 + tIndex * 17) % 360)
          };
        }
      });

      return layout;
    }

    function syncToppingLayoutForCurrentSelection() {
      const toppings = selectedPizzaToppings(state.selectedIngredients);
      const next = { ...state.toppingLayout };
      const validKeys = new Set();

      toppings.forEach((ing, tIndex) => {
        const pieceCount = ing.pieces || 8;
        for (let i = 0; i < pieceCount; i++) {
          const key = `${ing.id}_${i}`;
          validKeys.add(key);
          if (!next[key]) {
            const angle = ((Math.PI * 2) / pieceCount) * i + (tIndex * 0.35);
            const ring = 18 + ((i + tIndex) % 3) * 10;
            next[key] = {
              top: clamp(50 + Math.sin(angle) * ring * 0.85, 15, 85),
              left: clamp(50 + Math.cos(angle) * ring * 0.85, 15, 85),
              rotate: Math.floor((i * 29 + tIndex * 17) % 360)
            };
          }
        }
      });

      Object.keys(next).forEach((key) => {
        if (!validKeys.has(key)) delete next[key];
      });

      state.toppingLayout = next;
    }

    // =========================================================
    // 5. 인증 / 구독
    // =========================================================
    async function initAuth() {
      try {
        await auth.signInAnonymously();
      } catch (err) {
        console.error("인증 중 오류 발생:", err);
        showAlert("익명 로그인에 실패했습니다.");
      }

      auth.onAuthStateChanged((user) => {
        state.user = user || null;
        state.authReady = true;
        render();
      });
    }

    async function subscribeRoom(roomId) {
      cleanupSubscriptions();

      const unsubRoom = roomRef(roomId).onSnapshot((snap) => {
        state.roomData = snap.exists ? { id: snap.id, ...snap.data() } : null;
        render();
      });

      const unsubParticipants = participantsRef(roomId).onSnapshot((snap) => {
        state.participants = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        const me = getMyParticipant();
        if (me && typeof me.wallet === "number") {
          state.buyerWallet = me.wallet;
        }
        render();
      });

      const unsubPizzas = pizzasRef(roomId).onSnapshot((snap) => {
        state.pizzas = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        state.hasSubmitted = !!getMyPizza();
        render();
      });

      state.unsubscribers.push(unsubRoom, unsubParticipants, unsubPizzas);
    }

    // =========================================================
    // 6. 방 / 참여자 / 단계
    // =========================================================
    async function handleCreateRoom() {
      if (!state.user) return showAlert("로그인이 준비 중입니다.");
      const roomId = makeRoomCode();

      try {
        await roomRef(roomId).set({
          roomId,
          status: "making",
          createdAt: Date.now(),
          teacherUid: state.user.uid,
          teacherName: state.teacherDisplayName || "교사"
        });

        state.role = "teacher";
        state.currentRoomId = roomId;
        state.roomData = { roomId, status: "making" };
        await subscribeRoom(roomId);
        render();
        showAlert(`새 학급 코드 ${roomId} 생성 완료!`);
      } catch (err) {
        console.error(err);
        showAlert("학급 생성 중 오류가 발생했습니다.");
      }
    }

    async function handleJoinRoom() {
      const roomId = state.roomCodeInput.trim().toUpperCase();
      const name = state.studentName.trim();

      if (!state.user) return showAlert("로그인이 준비 중입니다.");
      if (!name) return showAlert("학생 이름을 입력해 주세요.");
      if (!roomId) return showAlert("방 코드를 입력해 주세요.");

      try {
        const roomSnap = await roomRef(roomId).get();
        if (!roomSnap.exists) return showAlert("해당 방 코드를 찾을 수 없습니다.");

        const participantDocId = STUDENT_SESSION_ID;
        await participantsRef(roomId).doc(participantDocId).set({
          sessionId: STUDENT_SESSION_ID,
          uid: state.user.uid,
          name,
          joinedAt: Date.now(),
          wallet: MAX_BUYING_BUDGET,
          purchasedPizzas: [],
          role: "student"
        }, { merge: true });

        state.role = "student";
        state.currentRoomId = roomId;
        state.buyerWallet = MAX_BUYING_BUDGET;
        state.purchasedPizzas = [];
        await subscribeRoom(roomId);
        render();
        showAlert(`${name} 학생 입장 완료!`);
      } catch (err) {
        console.error(err);
        showAlert("교실 입장 중 오류가 발생했습니다.");
      }
    }

    async function handleExitRoom() {
      cleanupSubscriptions();

      state.role = null;
      state.currentRoomId = null;
      state.roomData = null;
      state.participants = [];
      state.pizzas = [];
      state.pizzaName = "";
      state.selectedIngredients = [];
      state.toppingLayout = {};
      state.priceInput = 12000;
      state.hasSubmitted = false;
      state.buyerWallet = MAX_BUYING_BUDGET;
      state.purchasedPizzas = [];
      render();
    }

    async function handleStageChange(nextStatus) {
      if (state.role !== "teacher" || !state.currentRoomId) return;
      try {
        await roomRef(state.currentRoomId).update({ status: nextStatus });
        showAlert(`단계가 ${nextStatus}로 전환되었습니다.`);
      } catch (err) {
        console.error(err);
        showAlert("단계 전환에 실패했습니다.");
      }
    }

    async function handleResetRoom() {
      if (state.role !== "teacher" || !state.currentRoomId) return;
      const ok = confirm("정말 이 방의 학생/피자 데이터를 초기화할까요?");
      if (!ok) return;

      try {
        const pSnap = await participantsRef(state.currentRoomId).get();
        const zSnap = await pizzasRef(state.currentRoomId).get();

        const batch = db.batch();

        pSnap.docs.forEach((doc) => {
          batch.set(doc.ref, {
            ...doc.data(),
            wallet: MAX_BUYING_BUDGET,
            purchasedPizzas: []
          }, { merge: true });
        });

        zSnap.docs.forEach((doc) => {
          batch.delete(doc.ref);
        });

        batch.update(roomRef(state.currentRoomId), {
          status: "making"
        });

        await batch.commit();

        state.buyerWallet = MAX_BUYING_BUDGET;
        state.purchasedPizzas = [];
        state.selectedIngredients = [];
        state.toppingLayout = {};
        state.pizzaName = "";
        state.priceInput = 12000;
        state.hasSubmitted = false;

        showAlert("학급 데이터 초기화 완료!");
      } catch (err) {
        console.error(err);
        showAlert("초기화 중 오류가 발생했습니다.");
      }
    }

    // =========================================================
    // 7. 피자 제작
    // =========================================================
    function canSelectIngredient(item) {
      const selected = state.selectedIngredients.slice();
      const currentCost = calculateIngredientCost(selected);

      if (selected.includes(item.id)) return true;
      if (currentCost + item.price > MAX_MAKING_BUDGET) return false;

      if (["edge", "sauce", "cheese"].includes(item.category)) {
        if (countByCategory(selected, item.category) >= 1) return false;
      }
      return true;
    }

    function toggleIngredient(id) {
      const item = getIngredientById(id);
      if (!item) return;

      const selected = state.selectedIngredients.slice();
      const exists = selected.includes(id);

      if (exists) {
        state.selectedIngredients = selected.filter((x) => x !== id);
        syncToppingLayoutForCurrentSelection();
        render();
        return;
      }

      if (!canSelectIngredient(item)) {
        showAlert("예산 초과이거나 같은 종류 재료를 중복 선택할 수 없습니다.");
        return;
      }

      if (["edge", "sauce", "cheese"].includes(item.category)) {
        const withoutSameCategory = state.selectedIngredients.filter((sid) => {
          const sItem = getIngredientById(sid);
          return sItem?.category !== item.category;
        });
        state.selectedIngredients = [...withoutSameCategory, id];
      } else {
        state.selectedIngredients = [...state.selectedIngredients, id];
      }

      syncToppingLayoutForCurrentSelection();
      render();
    }

    function makingValidationMessage() {
      if (!state.pizzaName.trim()) return "피자 이름을 입력해 주세요.";
      if (!hasCategory(state.selectedIngredients, "edge")) return "도우/엣지를 1개 선택해 주세요.";
      if (!hasCategory(state.selectedIngredients, "sauce")) return "소스를 1개 선택해 주세요.";
      if (!hasCategory(state.selectedIngredients, "cheese")) return "치즈를 1개 선택해 주세요.";
      if (selectedPizzaToppings(state.selectedIngredients).length < 1) return "토핑을 1개 이상 선택해 주세요.";
      if (calculateIngredientCost(state.selectedIngredients) > MAX_MAKING_BUDGET) return "제작 예산 30,000원을 초과했습니다.";
      if (Number(state.priceInput) < 5000) return "판매 가격은 최소 5,000원 이상으로 정해 주세요.";
      return null;
    }

    async function handleSubmitPizza() {
      if (state.role !== "student" || !state.currentRoomId) return;
      const errMsg = makingValidationMessage();
      if (errMsg) return showAlert(errMsg);

      try {
        const pizzaDocId = STUDENT_SESSION_ID;
        await pizzasRef(state.currentRoomId).doc(pizzaDocId).set({
          ownerSessionId: STUDENT_SESSION_ID,
          ownerUid: state.user?.uid || null,
          ownerName: state.studentName.trim(),
          pizzaName: state.pizzaName.trim(),
          selectedIngredients: state.selectedIngredients,
          toppingLayout: state.toppingLayout,
          ingredientCost: calculateIngredientCost(state.selectedIngredients),
          price: Number(state.priceInput),
          buyers: [],
          createdAt: Date.now()
        }, { merge: true });

        state.hasSubmitted = true;
        render();
        showAlert("피자 등록 완료!");
      } catch (err) {
        console.error(err);
        showAlert("피자 등록 중 오류가 발생했습니다.");
      }
    }

    // =========================================================
    // 8. 구매 / 환불
    // =========================================================
    async function handleBuyPizza(pizzaId) {
      if (state.role !== "student" || !state.currentRoomId) return;
      const pizza = state.pizzas.find((p) => p.id === pizzaId);
      const me = getMyParticipant();

      if (!pizza || !me) return;
      if (pizza.ownerSessionId === STUDENT_SESSION_ID) return showAlert("자기 피자는 구매할 수 없습니다.");
      if (state.roomData?.status !== "selling") return showAlert("현재는 판매 단계가 아닙니다.");
      if (state.buyerWallet < pizza.price) return showAlert("구매 예산이 부족합니다.");

      try {
        const pizzaDocRef = pizzasRef(state.currentRoomId).doc(pizzaId);
        const participantDocRef = participantsRef(state.currentRoomId).doc(STUDENT_SESSION_ID);

        await db.runTransaction(async (tx) => {
          const pizzaSnap = await tx.get(pizzaDocRef);
          const participantSnap = await tx.get(participantDocRef);
          if (!pizzaSnap.exists || !participantSnap.exists) throw new Error("대상이 존재하지 않습니다.");

          const pizzaData = pizzaSnap.data();
          const participantData = participantSnap.data();

          const wallet = Number(participantData.wallet || 0);
          if (wallet < pizzaData.price) throw new Error("예산 부족");

          const buyers = Array.isArray(pizzaData.buyers) ? pizzaData.buyers.slice() : [];
          buyers.push({
            sessionId: STUDENT_SESSION_ID,
            name: state.studentName.trim(),
            boughtAt: Date.now()
          });

          const purchased = Array.isArray(participantData.purchasedPizzas) ? participantData.purchasedPizzas.slice() : [];
          purchased.push({
            pizzaId,
            pizzaName: pizzaData.pizzaName,
            ownerName: pizzaData.ownerName,
            price: pizzaData.price,
            boughtAt: Date.now()
          });

          tx.update(pizzaDocRef, { buyers });
          tx.update(participantDocRef, {
            wallet: wallet - pizzaData.price,
            purchasedPizzas: purchased
          });
        });

        showAlert("피자 구매 완료!");
      } catch (err) {
        console.error(err);
        showAlert(err.message === "예산 부족" ? "예산이 부족합니다." : "구매 처리 중 오류가 발생했습니다.");
      }
    }

    async function handleRefundPizza(pizzaId) {
      if (state.role !== "student" || !state.currentRoomId) return;
      const me = getMyParticipant();
      if (!me) return;

      try {
        const pizzaDocRef = pizzasRef(state.currentRoomId).doc(pizzaId);
        const participantDocRef = participantsRef(state.currentRoomId).doc(STUDENT_SESSION_ID);

        await db.runTransaction(async (tx) => {
          const pizzaSnap = await tx.get(pizzaDocRef);
          const participantSnap = await tx.get(participantDocRef);
          if (!pizzaSnap.exists || !participantSnap.exists) throw new Error("대상이 존재하지 않습니다.");

          const pizzaData = pizzaSnap.data();
          const participantData = participantSnap.data();

          const buyers = Array.isArray(pizzaData.buyers) ? pizzaData.buyers.slice() : [];
          const idx = buyers.map((b) => b.sessionId).lastIndexOf(STUDENT_SESSION_ID);
          if (idx === -1) throw new Error("환불 대상 구매 내역이 없습니다.");

          buyers.splice(idx, 1);

          const purchased = Array.isArray(participantData.purchasedPizzas) ? participantData.purchasedPizzas.slice() : [];
          const pIdx = purchased.map((x) => x.pizzaId).lastIndexOf(pizzaId);
          if (pIdx === -1) throw new Error("환불 대상 내역 없음");

          const refunded = purchased[pIdx];
          purchased.splice(pIdx, 1);

          tx.update(pizzaDocRef, { buyers });
          tx.update(participantDocRef, {
            wallet: Number(participantData.wallet || 0) + Number(refunded.price || 0),
            purchasedPizzas: purchased
          });
        });

        showAlert("환불 완료!");
      } catch (err) {
        console.error(err);
        showAlert("환불 취소 처리 도중 오류가 발생했습니다.");
      }
    }

    function attachDragHandlers() {
      const pieces = document.querySelectorAll(".pizza-piece");
      pieces.forEach((el) => {
        let dragging = false;
        let start = { x: 0, y: 0 };

        el.addEventListener("pointerdown", (e) => {
          const pizzaId = el.dataset.pizzaId;
          if (pizzaId !== "editor") return;
          dragging = true;
          start = { x: e.clientX, y: e.clientY };
          try { el.setPointerCapture(e.pointerId); } catch (err) {}
        });

        el.addEventListener("pointermove", (e) => {
          if (!dragging) return;
          const parent = el.parentElement;
          if (!parent) return;

          const rect = parent.getBoundingClientRect();
          const dx = e.clientX - start.x;
          const dy = e.clientY - start.y;
          start = { x: e.clientX, y: e.clientY };

          const key = el.dataset.pieceKey;
          const pos = state.toppingLayout[key];
          if (!pos) return;

          const pxToPctX = (dx / rect.width) * 100;
          const pxToPctY = (dy / rect.height) * 100;

          pos.left = clamp(pos.left + pxToPctX, 8, 92);
          pos.top = clamp(pos.top + pxToPctY, 8, 92);

          el.style.left = pos.left + "%";
          el.style.top = pos.top + "%";
        });

        function stopDrag(e) {
          if (!dragging) return;
          dragging = false;
          try { el.releasePointerCapture(e.pointerId); } catch (err) {}
        }

        el.addEventListener("pointerup", stopDrag);
        el.addEventListener("pointercancel", stopDrag);
      });
    }

    function render() {
      const shell = `
        <div class="min-h-screen flex flex-col">
          <header class="sticky top-0 z-30 bg-white/90 backdrop-blur border-b-4 border-orange-200 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
              <div>
                <h1 class="text-2xl md:text-3xl font-black text-orange-600">🍕 피자나라 경제교실</h1>
                <p class="text-xs md:text-sm text-slate-600 font-bold mt-1">한정된 자원으로 최고의 경제적 가치를 만들어보는 실시간 경제 활동 수업</p>
              </div>
              <div class="flex gap-2">
                <button id="tab-main" class="px-4 py-2 rounded-xl text-sm font-black border-2 ${state.activeTab==='main' ? 'bg-orange-500 text-white border-orange-500':'bg-white text-orange-700 border-orange-200'}">메인</button>
                <button id="tab-about" class="px-4 py-2 rounded-xl text-sm font-black border-2 ${state.activeTab==='about' ? 'bg-orange-500 text-white border-orange-500':'bg-white text-orange-700 border-orange-200'}">활동 안내</button>
              </div>
            </div>
          </header>

          ${state.activeTab === "about"
            ? renderAbout()
            : !state.currentRoomId
              ? renderLobby()
              : `
                <main class="flex-grow max-w-7xl w-full mx-auto p-4 md:p-6">
                  ${state.role === "teacher" ? renderTeacherPanel() : renderStudentPanel()}
                </main>
              `
          }

          <footer class="mt-auto py-6 border-t border-orange-200 bg-orange-50 text-center text-xs text-orange-950/60 font-semibold font-mono">
            <p>초등학교 사회과 4학년 실습 가상 피자 마켓 시뮬레이션</p>
            <p class="mt-1">한정된 자원으로 최고의 경제적 가치를 창조하세요!</p>
          </footer>

          ${state.alertMessage ? `
            <div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl bg-slate-900 text-white shadow-2xl font-black text-sm">
              ${escapeHtml(state.alertMessage)}
            </div>
          ` : ""}

          ${state.activeQuiz === "making" ? `
            <div class="fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4">
              <div class="max-w-lg w-full bg-white rounded-3xl border-4 border-sky-200 p-6 shadow-2xl">
                <p class="text-xs font-black text-sky-700">미니 퀴즈</p>
                <h3 class="text-xl font-black mt-1">왜 모든 재료를 다 넣지 못할까요?</h3>
                <div class="mt-4 space-y-3">
                  ${[
                    "재료가 무한해서",
                    "예산이 한정되어 있어서",
                    "피자는 토핑을 넣으면 안 돼서",
                    "친구들이 허락하지 않아서"
                  ].map((choice, idx) => `
                    <button class="quiz-choice w-full text-left rounded-2xl border-2 px-4 py-3 font-black ${state.makingQuizAnswer === idx ? 'bg-sky-500 text-white border-sky-500':'bg-white border-sky-200 hover:bg-sky-50'}" data-quiz-index="${idx}">
                      ${idx + 1}. ${escapeHtml(choice)}
                    </button>
                  `).join("")}
                </div>
                <div class="mt-5 flex gap-3">
                  <button id="close-quiz" class="flex-1 py-3 rounded-2xl bg-slate-100 hover:bg-slate-200 font-black">닫기</button>
                  <button id="check-quiz" class="flex-1 py-3 rounded-2xl bg-sky-500 hover:bg-sky-600 text-white font-black">정답 확인</button>
                </div>
              </div>
            </div>
          ` : ""}

          ${renderReportHidden()}
        </div>
      `;

      document.getElementById("app").innerHTML = shell;
      bindEvents();
      attachDragHandlers();
    }

    // =========================================================
    // 13. 이벤트 바인딩
    // =========================================================
    function bindEvents() {
      const safeBind = (id, event, fn) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener(event, fn);
      };

      safeBind("tab-main", "click", () => {
        state.activeTab = "main";
        render();
      });

      safeBind("tab-about", "click", () => {
        state.activeTab = "about";
        render();
      });

      safeBind("go-main", "click", () => {
        state.activeTab = "main";
        render();
      });

      safeBind("teacher-display-name", "input", (e) => {
        state.teacherDisplayName = e.target.value;
      });

      safeBind("student-name", "input", (e) => {
        state.studentName = e.target.value;
      });

      safeBind("room-code", "input", (e) => {
        state.roomCodeInput = String(e.target.value || "").toUpperCase();
      });

      safeBind("create-room", "click", handleCreateRoom);
      safeBind("join-room", "click", handleJoinRoom);
      safeBind("exit-room", "click", handleExitRoom);

      safeBind("pizza-name", "input", (e) => {
        state.pizzaName = e.target.value;
      });

      safeBind("price-input", "input", (e) => {
        const value = Number(e.target.value || 0);
        state.priceInput = value;
      });

      safeBind("submit-pizza", "click", handleSubmitPizza);
      safeBind("open-making-quiz", "click", () => {
        state.activeQuiz = "making";
        state.makingQuizAnswer = null;
        render();
      });

      safeBind("close-quiz", "click", () => {
        state.activeQuiz = null;
        render();
      });

      safeBind("check-quiz", "click", () => {
        if (state.makingQuizAnswer === 1) {
          showAlert("정답! 경제 활동에서는 자원과 예산이 한정되어 있어요.");
        } else {
          showAlert("다시 생각해보세요. 핵심은 '한정된 자원과 예산'입니다.");
        }
        state.activeQuiz = null;
        render();
      });

      document.querySelectorAll(".quiz-choice").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.makingQuizAnswer = Number(btn.dataset.quizIndex);
          render();
        });
      });

      document.querySelectorAll(".ingredient-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          toggleIngredient(btn.dataset.ingredientId);
        });
      });

      document.querySelectorAll(".buy-pizza").forEach((btn) => {
        btn.addEventListener("click", () => handleBuyPizza(btn.dataset.pizzaId));
      });

      document.querySelectorAll(".refund-pizza").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (btn.disabled) return;
          handleRefundPizza(btn.dataset.pizzaId);
        });
      });

      safeBind("stage-making", "click", () => handleStageChange("making"));
      safeBind("stage-selling", "click", () => handleStageChange("selling"));
      safeBind("stage-ranking", "click", () => handleStageChange("ranking"));
      safeBind("reset-room", "click", handleResetRoom);
      safeBind("download-pdf", "click", generatePDFReport);
    }

    // =========================================================
    // 14. 시작
    // =========================================================
    (async function boot() {
      render();
      await initAuth();
      render();
    })();
  </script>
</body>
</html>
